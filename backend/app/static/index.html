              <div class="calib-info-row two">
                ${dateCell("receive_date", "收样日期")}
                ${dateCell("calibration_date", "校准日期")}
              </div>
            </div>
          `;
        };
        const renderedRowsHtml = groupTitle === "其它校准信息" ? buildCalibInfoLayout() : rowHtml;
        const blockText = cleanBlockText(section.block || "");
        const blockHtml = blockText
          ? renderStructuredBlockHtml(blockText, {
            forceGeneralCheckTable: groupTitle === "校准结果/说明（续页）" && !!section.forceGeneralCheckTable,
          })
          : "";
        const toggleHtml = collapsible
          ? `<button type="button" class="source-recog-group-toggle" data-group-toggle="1" data-group-key="${escapeAttr(groupKey)}" aria-expanded="${collapsed ? "false" : "true"}" title="${collapsed ? "展开" : "收起"}">${collapsed ? "▶" : "▼"}</button>`
          : "";
        let contentHtml = "";
        if (!collapsed) {
          const hasRows = !!String(renderedRowsHtml || "").trim();
          const hasBlock = !!String(blockHtml || "").trim();
          if (hasRows) contentHtml += renderedRowsHtml;
          if (hasBlock) contentHtml += blockHtml;
          if (!hasRows && !hasBlock) contentHtml = '<div class="source-recog-block">（空）</div>';
        }
        return `<div class="source-recog-group ${collapsed ? "is-collapsed" : ""}"><div class="source-recog-group-title">${toggleHtml}<span class="source-recog-group-title-text">${escapeHtml(groupTitle)}</span></div>${contentHtml}</div>`;
      }).join("");
    }

    function parseTableRowsFromBlock(blockText) {
      const lines = String(blockText || "").split("\n").map((x) => x.trim()).filter(Boolean);
      if (lines.length < 2) return null;

      const tryWithSplitter = (splitter) => {
        const rows = lines.map((line) => splitter(line).map((cell) => cell.trim()).filter((cell) => cell !== ""));
        if (!rows.every((row) => row.length >= 2)) return null;
        const colCount = rows[0].length;
        if (colCount < 2) return null;
        if (!rows.every((row) => row.length === colCount)) return null;
        return rows;
      };

      const tableByTab = tryWithSplitter((line) => line.split("\t"));
      if (tableByTab) return tableByTab;

      const hasPipe = lines.every((line) => line.includes("|"));
      if (hasPipe) {
        const tableByPipe = tryWithSplitter((line) => line.split("|"));
        if (tableByPipe) return tableByPipe;
      }

      const tableBySpace = tryWithSplitter((line) => line.split(/\s{2,}/));
      if (tableBySpace && tableBySpace.length >= 3) return tableBySpace;

      const parseInstrumentBlockTable = () => {
        const hasInstrumentMarker = lines.some((line) => /本次校准所使用的主要计量标准器具|main measurement standard instruments used in this calibration/i.test(line));
        const hasColumnMarker = lines.some((line) => /测量范围|measurement range|证书编号|certificate number|溯源机构|traceability/i.test(line));
        if (!hasInstrumentMarker && !hasColumnMarker) return null;

        const isNoise = (line) => {
          const text = String(line || "").trim();
          if (!text) return true;
          const patterns = [
            /本次校准所使用的主要计量标准器具/i,
            /main measurement standard instruments used in this calibration/i,
            /^(?:编\s*号|number|编号\s*\/?\s*number)$/i,
            /^(?:编号\s*number|number\s*编号)$/i,
            /^(?:测量范围|measurement range)$/i,
            /^(?:测量范围\s*measurement range)$/i,
            /准确度等级/i,
            /最大允许误差/i,
            /不确定度/i,
            /measurement range\s*\/\s*accuracy class/i,
            /maximum permissible errors/i,
            /uncertainty of measurement/i,
            /^(?:证书编号\s*\/\s*有效期|certificate number\s*\/\s*valid date)$/i,
            /^(?:证书编号\s*有效期|certificate number\s*valid date)$/i,
            /^(?:溯源机构名称|name of traceability)$/i,
            /^(?:溯源机构名称\s*name of traceability)$/i,
            /^institution$/i,
            /^以上计量标准器具/u,
            /^quantity values of above measurement standards/i,
          ];
          return patterns.some((pattern) => pattern.test(text));
        };
        const dataLines = lines.filter((line) => !isNoise(line));
        if (dataLines.length < 6) return null;

        const splitMergedInstrumentLines = (sourceLines) => {
          const result = [];
          const namePattern = /[\u4e00-\u9fa5]{2,16}(?:温度表|秒表|直尺|卡尺|天平|砝码|试验仪|试验机|电桥|表|尺|仪)/g;
          for (const rawLine of sourceLines) {
            const line = String(rawLine || "").trim();
            if (!line) continue;
            const matches = [...line.matchAll(namePattern)];
            if (matches.length < 2) {
              result.push(line);
              continue;
            }
            const points = matches.map((m) => m.index || 0).filter((idx) => idx > 0).sort((a, b) => a - b);
            if (!points.length) {
              result.push(line);
              continue;
            }
            let start = 0;
            for (const idx of points) {
              const part = line.slice(start, idx).trim();
              if (part) result.push(part);
              start = idx;
            }
            const tail = line.slice(start).trim();
            if (tail) result.push(tail);
          }
          return result;
        };

        const preparedLines = splitMergedInstrumentLines(dataLines);

        const parseRowsByCatalogName = () => {
          if (!state.instrumentCatalogTokenSet || !state.instrumentCatalogTokenSet.size) return null;
          const nameIndexes = [];
          for (let i = 0; i < preparedLines.length; i += 1) {
            const token = normalizeCatalogToken(preparedLines[i]);
            if (token && state.instrumentCatalogTokenSet.has(token)) nameIndexes.push(i);
          }
          if (!nameIndexes.length) return null;

          const looksLikeCode = (v) => /^[A-Za-z]{1,4}[A-Za-z0-9-]{3,}$/.test(String(v || "").replace(/\s+/g, ""));
          const looksLikeRange = (v) => /(?:~|～|至|to|μA|mA|A|V|kV|mm|cm|m|℃|°C|\(\s*[-\d~～]+\s*\))/i.test(String(v || ""));
          const looksLikeUncertainty = (v) => /(?:u\s*=|Urel|U=|k\s*=|电压|电流|长度|重复性|时间间隔|日差|μV|mV|%RH)/i.test(String(v || ""));
          const looksLikeDate = (v) => /(?:\d{4}年\d{1,2}月\d{1,2}日|\d{4}[./-]\d{1,2}[./-]\d{1,2})/.test(String(v || ""));
          const looksLikeInstitution = (v) => /^[A-Z]{2,8}$/.test(String(v || "").trim());
          const header = ["计量标准器具名称", "型号/规格", "编号", "测量范围", "准确度/不确定度", "证书编号/有效期", "溯源机构"];
          const rows = [];

          for (let ni = 0; ni < nameIndexes.length; ni += 1) {
            const start = nameIndexes[ni];
            const end = ni + 1 < nameIndexes.length ? nameIndexes[ni + 1] : preparedLines.length;
            const seg = preparedLines.slice(start, end).map((x) => String(x || "").trim()).filter(Boolean);
            if (!seg.length) continue;
            const name = seg[0];
            let model = "";
            let code = "";
            let range = "";
            const uncertaintyParts = [];
            const certParts = [];
            let institution = "";
            for (let i = 1; i < seg.length; i += 1) {
              const text = seg[i];
              if (!text) continue;
              if (!institution && looksLikeInstitution(text)) {
                institution = text;
                continue;
              }
              if (!code && looksLikeCode(text)) {
                code = text;
                continue;
              }
              if (looksLikeDate(text) || /(?:^[A-Za-z0-9-]{6,}$)/.test(text)) {
                certParts.push(text);
                continue;
              }
              if (!range && looksLikeRange(text)) {
                range = text;
                continue;
              }
              if (looksLikeUncertainty(text)) {
                uncertaintyParts.push(text);
                continue;
              }
              if (!model) {
                model = text;
                continue;
              }
              uncertaintyParts.push(text);
            }
            if (!model && seg.length > 1) model = seg[1];
            rows.push([name, model, code, range, uncertaintyParts.join(" ").trim(), certParts.join(" ").trim(), institution]);
          }

          if (!rows.length) return null;
          return [header, ...rows];
        };

        const parseRowsByLikelyName = () => {
          const isLikelyName = (text) => {
            const v = String(text || "").trim();
            if (!v) return false;
            if (v.length > 24) return false;
            if (/[:：]/.test(v)) return false;
            if (/^(?:测量范围|编号|型号|证书编号|有效期|溯源机构|准确度|不确定度|main measurement)/i.test(v)) return false;
            if (/(?:~|～|to|℃|°C|%RH|k=|U=|Urel|年|月|日)/i.test(v)) return false;
            if (/^[A-Za-z]{2,8}$/.test(v)) return false;
            if (/^[A-Za-z]{1,4}[A-Za-z0-9-]{3,}$/.test(v.replace(/\s+/g, ""))) return false;
            return /[\u4e00-\u9fa5]/.test(v);
          };

          const nameIndexes = [];
          for (let i = 0; i < preparedLines.length; i += 1) {
            if (isLikelyName(preparedLines[i])) nameIndexes.push(i);
          }
          if (!nameIndexes.length) return null;

          const looksLikeCode = (v) => /^[A-Za-z]{1,4}[A-Za-z0-9-]{3,}$/.test(String(v || "").replace(/\s+/g, ""));
          const looksLikeRange = (v) => /(?:~|～|至|to|μA|mA|A|V|kV|mm|cm|m|℃|°C|\(\s*[-\d~～]+\s*\))/i.test(String(v || ""));
          const looksLikeUncertainty = (v) => /(?:u\s*=|Urel|U=|k\s*=|电压|电流|长度|重复性|时间间隔|日差|μV|mV|%RH)/i.test(String(v || ""));
          const looksLikeDate = (v) => /(?:\d{4}年\d{1,2}月\d{1,2}日|\d{4}[./-]\d{1,2}[./-]\d{1,2})/.test(String(v || ""));
          const looksLikeInstitution = (v) => /^[A-Z]{2,8}$/.test(String(v || "").trim());
          const header = ["计量标准器具名称", "型号/规格", "编号", "测量范围", "准确度/不确定度", "证书编号/有效期", "溯源机构"];
          const rows = [];

          for (let ni = 0; ni < nameIndexes.length; ni += 1) {
            const start = nameIndexes[ni];
            const end = ni + 1 < nameIndexes.length ? nameIndexes[ni + 1] : preparedLines.length;
            const seg = preparedLines.slice(start, end).map((x) => String(x || "").trim()).filter(Boolean);
            if (!seg.length) continue;
            const name = seg[0];
            let model = "";
            let code = "";
            let range = "";
            const uncertaintyParts = [];
            const certParts = [];
            let institution = "";
            for (let i = 1; i < seg.length; i += 1) {
              const text = seg[i];
              if (!text) continue;
              if (!institution && looksLikeInstitution(text)) {
                institution = text;
                continue;
              }
              if (!code && looksLikeCode(text)) {
                code = text;
                continue;
              }
              if (looksLikeDate(text) || /(?:^[A-Za-z0-9-]{6,}$)/.test(text)) {
                certParts.push(text);
                continue;
              }
              if (!range && looksLikeRange(text)) {
                range = text;
                continue;
              }
              if (looksLikeUncertainty(text)) {
                uncertaintyParts.push(text);
                continue;
              }
              if (!model) {
                model = text;
                continue;
              }
              uncertaintyParts.push(text);
            }
            if (!model && seg.length > 1) model = seg[1];
            rows.push([name, model, code, range, uncertaintyParts.join(" ").trim(), certParts.join(" ").trim(), institution]);
          }
          if (!rows.length) return null;
          return [header, ...rows];
        };

        const rowsByName = parseRowsByLikelyName();
        if (rowsByName && rowsByName.length > 1) return rowsByName;

        // Catalog-based parsing is only a fallback and must not drive initial recognition.
        const rowsByCatalog = parseRowsByCatalogName();
        if (rowsByCatalog && rowsByCatalog.length > 1) return rowsByCatalog;

        let chunkSize = 0;
        if (preparedLines.length % 8 === 0) chunkSize = 8;
        else if (preparedLines.length % 7 === 0) chunkSize = 7;

        const headersBySize = {
          8: ["计量标准器具名称", "型号/规格", "编号", "测量范围", "准确度/不确定度", "证书编号", "有效期", "溯源机构"],
          7: ["计量标准器具名称", "型号/规格", "编号", "测量范围", "准确度/不确定度", "证书编号/有效期", "溯源机构"],
        };
        const looksLikeNoiseCell = (text) => {
          const v = String(text || "").trim();
          if (!v) return true;
          const checks = [
            /准确度等级|最大允许误差|不确定度/i,
            /证书编号|有效期|certificate number|valid date/i,
            /时间间隔|日差|温度[:：]\s*u=|电压[:：]\s*u=|电流[:：]\s*u=/i,
            /以上计量标准器具|quantity values of above measurement standards/i,
          ];
          return checks.some((re) => re.test(v));
        };

        const pruneRows = (rows, nameCol = 0) => rows
          .filter((row) => Array.isArray(row) && row.some((cell) => String(cell || "").trim()))
          .filter((row) => !looksLikeNoiseCell(row[nameCol]));

        if (chunkSize > 0) {
          const header = headersBySize[chunkSize] || headersBySize[7];
          const rows = [];
          for (let i = 0; i < preparedLines.length; i += chunkSize) {
            rows.push(preparedLines.slice(i, i + chunkSize));
          }
          if (rows.length && rows.every((row) => row.length === chunkSize)) {
            const cleaned = pruneRows(rows, 0);
            if (cleaned.length) return [header, ...cleaned];
          }
        }

        // OCR often breaks a single cell into multiple lines; rebuild as 7-column rows.
        const looksLikeRangeContinuation = (text) => /(?:~|～|至|to|μA|mA|A|V|kV|mm|cm|m|℃|°C)/i.test(String(text || ""));
        const looksLikeUncertaintyContinuation = (text) => /(?:u\s*=|Urel|U=|k\s*=|电压|电流|长度|重复性|μV|mV|V)/i.test(String(text || ""));
        const looksLikeDateLike = (text) => /(?:\d{4}年\d{1,2}月\d{1,2}日|\d{4}[./-]\d{1,2}[./-]\d{1,2})/.test(String(text || ""));
        const looksLikeCertNo = (text) => /(?:\d{2,}|[A-Za-z]{1,6}[-/][A-Za-z0-9-]+)/.test(String(text || ""));

        const rows = [];
        let i = 0;
        while (i < preparedLines.length) {
          const remain = preparedLines.length - i;
          if (remain < 6) break;

          const name = preparedLines[i++] || "";
          const model = preparedLines[i++] || "";
          const code = preparedLines[i++] || "";

          let range = preparedLines[i++] || "";
          if (i < preparedLines.length && looksLikeRangeContinuation(preparedLines[i])) {
            range = `${range} ${preparedLines[i++]}`.trim();
          }

          let uncertainty = i < preparedLines.length ? (preparedLines[i++] || "") : "";
          if (i < preparedLines.length && looksLikeUncertaintyContinuation(preparedLines[i])) {
            uncertainty = `${uncertainty} ${preparedLines[i++]}`.trim();
          }

          let certAndDate = i < preparedLines.length ? (preparedLines[i++] || "") : "";
          if (i < preparedLines.length && (looksLikeDateLike(preparedLines[i]) || (!looksLikeDateLike(certAndDate) && looksLikeCertNo(preparedLines[i])))) {
            certAndDate = `${certAndDate} ${preparedLines[i++]}`.trim();
          }

          const institution = i < preparedLines.length ? (preparedLines[i++] || "") : "";
          rows.push([name, model, code, range, uncertainty, certAndDate, institution]);
        }

        if (!rows.length) return null;
        const cleaned = pruneRows(rows, 0);
        if (!cleaned.length) return null;
        return [headersBySize[7], ...cleaned];
      };

      const instrumentTable = parseInstrumentBlockTable();
      if (instrumentTable) return instrumentTable;

      return null;
    }

    function extractMeasurementItemsBlockText(item, fields) {
      const f = (fields && typeof fields === "object") ? fields : {};
      const recognized = (item && item.recognizedFields && typeof item.recognizedFields === "object")
        ? item.recognizedFields
        : {};
      const direct = String(recognized.measurement_items || "").trim() || String(f.measurement_items || "").trim();
      if (direct) return direct;
      const raw = String(f.raw_record || (item && item.rawText) || "");
      if (!raw) return "";
      const block = extractBlockByLine(
        raw,
        [/(?:本次校准所使用的主要计量标准器具|主要计量标准器具|Main measurement standard instruments)/i],
        [/(?:本次校准所依据的技术规范|检测\/校准依据|校准依据)/i, /(?:其它|其他)校准信息|Calibration Information/i, /(?:一般检查|General inspection)/i, /^备注[:：]?/i],
      );
      return String(block || "").trim();
    }

    function normalizeMeasurementItemsText(item, fields) {
      const block = extractMeasurementItemsBlockText(item, fields);
      if (!block) return "";
      const tableRows = parseTableRowsFromBlock(block);
      if (tableRows && tableRows.length >= 2) return tableRows.map((row) => row.join("\t")).join("\n");
      return block;
    }

    function shouldRebuildMeasurementItemsFromRaw(currentText, item) {
      const tableRows = parseTableRowsFromBlock(String(currentText || ""));
      if (!tableRows || tableRows.length < 2) return true;
      const sourceTag = String((item && item.fields && item.fields.measurement_items_source) || "").trim().toLowerCase();
      if (sourceTag === "structured") return false;
      const [header, ...body] = tableRows;
      const headerText = (Array.isArray(header) ? header : []).map((x) => String(x || "")).join(" ");
      const hasNameHeader = /器具名称|计量标准器具名称|instrument\s*name/i.test(headerText);
      const hasModelHeader = /型号\/规格|model\/specification/i.test(headerText);
      const hasCertHeader = /证书编号/i.test(headerText);
      const hasValidHeader = /有效期/i.test(headerText);
      const hasCombinedCertValid = /证书编号\s*\/\s*有效期|certificate number\s*\/\s*valid date/i.test(headerText);
      const colCount = Array.isArray(header) ? header.length : 0;
      if (!hasNameHeader) return true;
      if (!hasModelHeader) return true;
      if (!hasCertHeader && !hasCombinedCertValid) return true;
      if (!(colCount === 7 || colCount === 8)) return true;
      // 7列时证书+有效期合并，8列时分列，二者都允许
      if (colCount === 7 && hasValidHeader && !hasCombinedCertValid) return true;
      if (colCount === 8 && !hasValidHeader) return true;

      const firstRow = Array.isArray(body) && body.length ? body[0] : [];
      const firstName = String((firstRow && firstRow[0]) || "").trim();
      // 名称列如果落成证书号/日期，说明已经发生错位
      if (/^\d{4}年\d{1,2}月\d{1,2}日$/.test(firstName)) return true;
      if (/^[A-Za-z]\d{4,}/.test(firstName) || /^J\d{6,}/.test(firstName)) return true;
      const idx = getMeasurementHeaderIndexes(header);
      const looksLikeDate = (v) => /(?:\d{4}年\d{1,2}月\d{1,2}日|\d{4}[./-]\d{1,2}[./-]\d{1,2})/.test(String(v || ""));
      const looksLikeCode = (v) => /^[A-Za-z]{1,4}[A-Za-z0-9-]{3,}$/.test(String(v || "").replace(/\s+/g, ""));
      const looksLikeName = (v) => /[\u4e00-\u9fa5]{2,16}(?:温度表|秒表|直尺|卡尺|天平|砝码|试验仪|试验机|电桥|表|尺|仪)/.test(String(v || ""));
      const looksLikeRange = (v) => /(?:~|～|to|℃|°C|mm|cm|m|kV|V|A|\(\s*[-\d~～]+\s*\))/i.test(String(v || ""));
      const looksLikeUncertainty = (v) => /(?:u\s*=|Urel|U=|k\s*=|日差|时间间隔|长度[:：]|电压[:：]|电流[:：])/.test(String(v || ""));
      const looksLikeCertNo = (v) => /(?:J\d{6,}|[A-Za-z]{1,6}[-/][A-Za-z0-9-]{4,})/.test(String(v || ""));

      for (const row of body) {
        const name = String((row && row[idx.nameIdx]) || "").trim();
        const model = String((row && row[idx.modelIdx]) || "").trim();
        const code = String((row && row[idx.codeIdx]) || "").trim();
        const range = String((row && row[idx.codeIdx + 1]) || "").trim();
        const uncertainty = String((row && row[idx.codeIdx + 2]) || "").trim();
        const certCol = String((row && row[idx.codeIdx + 3]) || "").trim();

        // Typical misalignment in screenshot: model contains date, code contains name,
        // range contains uncertainty text, uncertainty/cert columns contain cert/date.
        if (looksLikeDate(model)) return true;
        if (looksLikeName(code) && !looksLikeCode(code)) return true;
        if (looksLikeUncertainty(range) && !looksLikeRange(range)) return true;
        if (looksLikeCertNo(uncertainty) || looksLikeDate(uncertainty)) return true;
        if (looksLikeDate(certCol) && !looksLikeCertNo(certCol)) return true;
        if (looksLikeRange(name) && !looksLikeName(name)) return true;
      }
      return false;
    }

    function buildFallbackMeasurementRows(text) {
      const header = ["计量标准器具名称", "型号/规格", "编号", "测量范围", "准确度/不确定度", "证书编号/有效期", "溯源机构"];
      const raw = String(text || "").trim();
      if (!raw) return [header, ["", "", "", "", "", "", ""]];
      const rows = [];
      const normalizedRaw = normalizeValidationToken(raw);
      const seen = new Set();
      const catalogRows = Array.isArray(state.instrumentCatalogRows) ? state.instrumentCatalogRows : [];
      for (const row of catalogRows) {
        const name = String((row && row.name) || "").trim();
        const token = normalizeCatalogToken(name);
        if (!token || seen.has(token)) continue;
        if (!normalizedRaw.includes(token)) continue;
        seen.add(token);
        rows.push([
          name,
          String((row && row.model) || "").trim(),
          String((row && row.code) || "").trim(),
          String((row && row.measurement_range) || "").trim(),
          String((row && row.uncertainty) || "").trim(),
          [String((row && row.certificate_no) || "").trim(), String((row && row.valid_date) || "").trim()].filter(Boolean).join(" ").trim(),
          String((row && row.traceability_institution) || "").trim(),
        ]);
      }
      if (!rows.length) rows.push([raw, "", "", "", "", "", ""]);
      return [header, ...rows];
    }

    function getMeasurementHeaderIndexes(headerRow) {
      const header = Array.isArray(headerRow) ? headerRow : [];
      const token = (x) => normalizeValidationToken(String(x || ""));
      const nameIdx = header.findIndex((h) => {
        const t = token(h);
        return t.includes("计量标准器具名称") || t.includes("器具名称") || t.includes("instrumentname");
      });
      const modelIdx = header.findIndex((h) => {
        const t = token(h);
        return t.includes("型号规格") || t.includes("modelspecification");
      });
      const codeIdx = header.findIndex((h) => {
        const t = token(h);
        return t === "编号" || t.includes("器具编号") || t.includes("instrumentserialnumber") || t.includes("serialnumber");
      });
      return {
        nameIdx: nameIdx >= 0 ? nameIdx : 0,
        modelIdx: modelIdx >= 0 ? modelIdx : 1,
        codeIdx: codeIdx >= 0 ? codeIdx : 2,
      };
    }

    function buildMeasurementCatalogMatchInfo(tableRows) {
      if (!Array.isArray(tableRows) || tableRows.length < 2) return [];
      const [header, ...body] = tableRows;
      const { nameIdx, modelIdx, codeIdx } = getMeasurementHeaderIndexes(header);
      const hasCatalog = !!(state.instrumentCatalogRows && state.instrumentCatalogRows.length);
      return body.map((row) => {
        const name = String((row && row[nameIdx]) || "").trim();
        const model = String((row && row[modelIdx]) || "").trim();
        const code = String((row && row[codeIdx]) || "").trim();
        if (!hasCatalog) {
          return { mismatch: false, reason: "", catalogRow: null };
        }
        const token = normalizeCatalogToken(name);
        const catalogRow = token ? state.instrumentCatalogRowByToken.get(token) : null;
        if (!catalogRow) {
          return { mismatch: true, reason: "目录无此器具", catalogRow: null };
        }
        const modelMismatch = !!model && !!catalogRow.model && normalizeValidationToken(model) !== normalizeValidationToken(catalogRow.model);
        const codeMismatch = !!code && !!catalogRow.code && normalizeValidationToken(code) !== normalizeValidationToken(catalogRow.code);
        if (modelMismatch || codeMismatch) {
          return { mismatch: true, reason: modelMismatch && codeMismatch ? "型号/编号不一致" : (modelMismatch ? "型号不一致" : "编号不一致"), catalogRow };
        }
        return { mismatch: false, reason: "", catalogRow };
      });
    }

    function parseKeyValueRowsFromBlock(blockText) {
      const lines = String(blockText || "").split("\n").map((x) => x.trim()).filter(Boolean);
      if (lines.length < 2) return null;
      const rows = [];
      for (const line of lines) {
        const m = line.match(/^([^:：]{1,60})[:：]\s*(.+)$/);
        if (!m) return null;
        rows.push({ key: m[1].trim(), value: m[2].trim() });
      }
      return rows.length ? rows : null;
    }

    function parseListLinesFromBlock(blockText) {
      const lines = String(blockText || "").split("\n").map((x) => x.trim()).filter(Boolean);
      if (lines.length < 2) return null;
      const items = [];
      const codeLike = (line) => /[A-Za-z]{1,5}\s*\/\s*T\s*\d+(?:\.\d+)?-\d{4}/i.test(String(line || ""));
      for (const line of lines) {
        const m = line.match(/^(?:[-*•]|(?:\d+|[一二三四五六七八九十]+)[、.．)]|\(\d+\))\s*(.+)$/);
        if (m) {
          items.push(m[1].trim());
          continue;
        }
        if (codeLike(line)) {
          items.push(line);
          continue;
        }
        return null;
      }
      return items.length ? items : null;
    }

    function parseGeneralCheckRowsFromBlock(blockText, forceTable = false) {
      const titleNoisePatterns = [
        /^校准结果\s*\/\s*说明(?:（续页）|\(续页\))?[:：]?$/i,
        /^results\s+of\s+calibration\s+and\s+additional\s+explanation(?:\s*\(continued\s+page\))?[:：]?$/i,
      ];
      const noiseLinePatterns = [
        /^[`'"\-|_~]+$/,
        /^results\s+of\s+calibration/i,
      ];
      const lines = String(blockText || "")
        .split("\n")
        .map((x) => x.trim())
        .filter(Boolean)
        .filter((line) => !titleNoisePatterns.some((pattern) => pattern.test(line)))
        .filter((line) => !noiseLinePatterns.some((pattern) => pattern.test(line)));
      if (!lines.length) return null;
      const rows = [];
      let hasGeneralCheckMarkers = false;
      let notePrefix = "";
      const normalizeGeneralCheckTitle = (value) => String(value || "")
        .replace(/一般检查\s*[（(]\s*\*\s*[）)]\s*[:：]?/g, "一般检查：")
        .replace(/General\s*inspection\s*[（(]\s*\*\s*[）)]\s*[:：]?/ig, "General inspection:")
        .trim();
      for (const line of lines) {
        if (/^注[:：]?/.test(line)) {
          break;
        }
        if (/^(?:一|二|三|四|五|六|七|八|九|十)[、.．]/.test(line)) {
          const m = line.match(/^((?:一|二|三|四|五|六|七|八|九|十)[、.．])\s*(.*)$/);
          rows.push([m ? m[1] : "", normalizeGeneralCheckTitle(m ? m[2] : line)]);
          hasGeneralCheckMarkers = true;
          continue;
        }
        if (/^\(\d+\)/.test(line)) {
          const m = line.match(/^(\(\d+\))\s*(.*)$/);
          const marker = m ? m[1] : "";
          const prefix = notePrefix ? `${notePrefix}${marker}` : marker;
          rows.push([prefix, m ? m[2] : line]);
          notePrefix = "";
          hasGeneralCheckMarkers = true;
          continue;
        }
        rows.push(["", normalizeGeneralCheckTitle(line)]);
      }
      const mergedRows = [];
      for (let i = 0; i < rows.length; i += 1) {
        const current = rows[i];
        const next = rows[i + 1];
        if (
          current
          && next
          && String(current[0] || "").trim()
          && !String(current[1] || "").trim()
          && !String(next[0] || "").trim()
          && String(next[1] || "").trim()
        ) {
          mergedRows.push([current[0], next[1]]);
          i += 1;
          continue;
        }
        if (!String(current[0] || "").trim() && !String(current[1] || "").trim()) continue;
        mergedRows.push(current);
      }
      const compactRows = [];
      for (let i = 0; i < mergedRows.length; i += 1) {
        const marker = String((mergedRows[i] && mergedRows[i][0]) || "").trim();
        const text = String((mergedRows[i] && mergedRows[i][1]) || "").trim();
        const isNestedHeader = /^(?:显\s*示\s*值|实\s*测\s*值)\s*\(?.*?[℃°cC]?\)?\s*[:：]?$/i.test(text);
        if (isNestedHeader) {
          const nums = [];
          let j = i + 1;
          while (j < mergedRows.length) {
            const nextMarker = String((mergedRows[j] && mergedRows[j][0]) || "").trim();
            const nextText = String((mergedRows[j] && mergedRows[j][1]) || "").trim();
            if (nextMarker) break;
            if (!/^[+-]?\d+(?:\.\d+)?$/.test(nextText)) break;
            nums.push(nextText);
            j += 1;
          }
          if (nums.length) {
            compactRows.push([marker, `${text} ${nums.join("  ")}`]);
            i = j - 1;
            continue;
          }
        }
        compactRows.push(mergedRows[i]);
      }
      if (hasGeneralCheckMarkers) return compactRows;
      if (forceTable && compactRows.length) return compactRows;
      return null;
    }

    function parseGeneralCheckRowsForEditor(blockText) {
      const rows = parseGeneralCheckRowsFromBlock(blockText, true);
      if (rows && rows.length) return rows.map((row) => [String(row[0] || "").trim(), String(row[1] || "").trim()]);
      const tableRows = parseTableRowsFromBlock(blockText);
      if (tableRows && tableRows.length) {
        return tableRows.map((row) => [String((row && row[0]) || "").trim(), String((row && row[1]) || "").trim()]);
      }
      return [];
    }

    function buildGeneralCheckTextFromRows(rows) {
      const safeRows = Array.isArray(rows) ? rows : [];
      return safeRows
        .map((row) => [String((row && row[0]) || "").trim(), String((row && row[1]) || "").trim()])
        .filter((row) => row[0] || row[1])
        .map((row) => `${row[0]}\t${row[1]}`.trim())
        .join("\n");
    }

    function renderStructuredBlockHtml(blockText, options = {}) {
      const forceGeneralCheckTable = !!(options && options.forceGeneralCheckTable);
      const generalCheckRows = parseGeneralCheckRowsFromBlock(blockText, forceGeneralCheckTable);
      if (generalCheckRows) {
        const bodyHtml = generalCheckRows
          .map((row) => `<tr><td>${escapeHtml(row[0] || "")}</td><td>${escapeHtml(row[1] || "")}</td></tr>`)
          .join("");
        return `<div class="source-recog-block source-recog-block-formatted"><table class="source-recog-block-table general-check-table"><tbody>${bodyHtml}</tbody></table></div>`;
      }

      const tableRows = parseTableRowsFromBlock(blockText);
      if (tableRows) {
        const [header, ...body] = tableRows;
        const headHtml = `<tr>${header.map((cell) => `<th>${escapeHtml(cell)}</th>`).join("")}</tr>`;
        const bodyHtml = body.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("");
        return `<div class="source-recog-block source-recog-block-formatted"><table class="source-recog-block-table"><thead>${headHtml}</thead><tbody>${bodyHtml}</tbody></table></div>`;
      }

      const kvRows = parseKeyValueRowsFromBlock(blockText);
      if (kvRows) {
        return kvRows.map((row) => `<div class="source-recog-item"><span class="source-recog-key">${escapeHtml(row.key)}</span><span class="source-recog-val">${escapeHtml(row.value)}</span></div>`).join("");
      }

      const listRows = parseListLinesFromBlock(blockText);
      if (listRows) {
        const liHtml = listRows.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
        return `<div class="source-recog-block source-recog-block-formatted"><ul class="source-recog-block-list">${liHtml}</ul></div>`;
      }

      return `<div class="source-recog-block">${escapeHtml(blockText)}</div>`;
    }

    function extractGeneralCheckBlockFromItem(item) {
      if (!item) return "";
      const raw = String(
        (item.fields && item.fields.raw_record)
        || item.rawText
        || "",
      );
      return extractGeneralCheckFullBlock(raw, item.fields || {});
    }

    function extractGeneralCheckFullBlock(raw, src = {}) {
      const text = String(raw || "");
      const srcObj = (src && typeof src === "object") ? src : {};
      const fromSrc = cleanBlockText(srcObj.general_check_full || "")
        || cleanBlockText(srcObj.general_check || "");
      if (fromSrc) return fromSrc;
      const fullBlock = extractBlockByLine(
        text,
        [/(?:校准结果\s*\/\s*说明|Results\s+of\s+calibration\s+and\s+additional\s+explanation)/i],
        [/(?:以下空白|\(以下空白\)|（以下空白）)/i, /(?:校准证书续页专用|Page\s+of\s+total\s+pages)/i, /(?:检测员|校准员|核验员|审核|批准)/i],
      );
      if (fullBlock) return fullBlock;
      return extractBlockByLine(
        text,
        [/(?:一[、.．)]\s*)?一般检查|General inspection/i],
        [/(?:以下空白|\(以下空白\)|（以下空白）)/i, /(?:校准证书续页专用|Page\s+of\s+total\s+pages)/i, /(?:检测员|校准员|核验员|审核|批准)/i],
      );
    }

    function maybeCopyGeneralCheckForBlankTemplate(item) {
      if (!item || !item.templateName) return;
      if (!/r[-_ ]?802b/i.test(String(item.templateName || ""))) return;
      if (!item.fields) item.fields = createEmptyFields();
      const raw = String(
        (item.fields && item.fields.raw_record)
        || item.rawText
        || "",
      );
      const extracted = extractGeneralCheckFullBlock(raw, item.fields || {}) || extractGeneralCheckBlockFromItem(item);
      if (!extracted) return;
      if (!String(item.fields.general_check_full || "").trim()) {
        item.fields.general_check_full = extracted;
      }
      if (String(item.fields.general_check || "").trim()) return;
      item.fields.general_check = extracted;
      if (!String(item.fields.measurement_items || "").trim()) {
        item.fields.measurement_items = extracted;
      }
    }

    function renderSourceFieldList(item) {
      const el = $("sourceFieldList");
      if (!el) return;
      if (!item) {
        el.innerHTML = '<div class="placeholder">识别字段未加载</div>';
        return;
      }
      const src = (item.recognizedFields && typeof item.recognizedFields === "object")
        ? item.recognizedFields
        : (item.fields || {});
      const problemKeys = getProblemFieldKeys(item);
      const sections = buildFocusSections(item, src, problemKeys, true);
      if (!sections.length) {
        el.innerHTML = '<div class="placeholder">识别字段为空</div>';
        return;
      }
      el.innerHTML = renderFocusSectionsHtml(sections, problemKeys, {
        collapsible: true,
        collapseState: state.sourceFieldGroupCollapsed,
        scope: `source:${item.id || item.fileName || ""}`,
      });
    }

    function renderTargetFieldForm(item) {
      if (!item) {
        $("targetFieldForm").innerHTML = '<div class="placeholder">字段表单未加载</div>';
        return;
      }
      if (!item.fields) item.fields = createEmptyFields();
      const f = item.fields || {};
      const rawForDate = String(f.raw_record || item.rawText || "");
      const dateInfo = extractCalibrationInfoFields(rawForDate, f);
      if (dateInfo.receiveDate && (!isCompleteDateText(f.receive_date) || !String(f.receive_date || "").trim())) {
        f.receive_date = dateInfo.receiveDate;
      }
      if (dateInfo.calibrationDate && (!isCompleteDateText(f.calibration_date) || !String(f.calibration_date || "").trim())) {
        f.calibration_date = dateInfo.calibrationDate;
      }
      if (dateInfo.releaseDate && (!isCompleteDateText(f.release_date) || !String(f.release_date || "").trim())) {
        f.release_date = dateInfo.releaseDate;
      }
      if (!String(f.general_check_full || "").trim()) {
        const full = extractGeneralCheckFullBlock(rawForDate, f);
        if (full) f.general_check_full = full;
      }
      if (!String(f.general_check || "").trim() && String(f.general_check_full || "").trim()) {
        f.general_check = String(f.general_check_full || "").trim();
      }
      if (!String(f.measurement_items || "").trim() || shouldRebuildMeasurementItemsFromRaw(f.measurement_items, item)) {
        const normalized = normalizeMeasurementItemsText(item, f);
        if (normalized) f.measurement_items = normalized;
      }
      const { fields: formFields, note, loading } = resolveTargetFormFields(item, f);
      const problemKeys = getProblemFieldKeys(item, formFields);
      const rowInfo = item.recordName || item.fileName || "未命名记录";
      const renderFieldControl = (field) => {
        const value = String(f[field.key] || "");
        const isProblem = problemKeys.has(field.key);
        if (field.key === "basis_standard") {
          const codeRegex = /([A-Za-z]{1,5}\s*\/\s*T\s*\d+(?:\.\d+)?-\d{4})/ig;
          const normalizeCode = (code) => String(code || "")
            .replace(/\s+/g, " ")
            .replace(/\s*\/\s*/g, "/")
            .replace(/\/\s*T\s*/ig, "/T ")
            .trim();
          const fromArray = Array.isArray(f.basis_standard_items) ? f.basis_standard_items : [];
          const source = fromArray.length ? fromArray.join("\n") : String(f.basis_standard || "");
          const items = [];
          const seen = new Set();
          let m;
          while ((m = codeRegex.exec(source)) !== null) {
            const code = normalizeCode(m[1] || "");
            if (!code || seen.has(code)) continue;
            seen.add(code);
            items.push(code);
          }
          if (!items.length && String(source || "").trim()) items.push(String(source).trim());
          const rows = (items.length ? items : [""]).map((itemValue, idx) => `
            <div class="basis-item-row">
              <span class="basis-item-no">${idx + 1}</span>
              <input type="text" data-field="basis_standard_item" data-index="${idx}" value="${escapeAttr(itemValue)}" />
              <button type="button" class="btn ghost" data-action="remove-basis-item" data-index="${idx}">删</button>
            </div>
          `).join("");
          return `
            <label class="source-form-item wide ${isProblem ? "is-problem" : ""}">
              <span>${escapeHtml(field.label)}</span>
              <div class="basis-items-wrap">
                ${rows}
                <button type="button" class="btn ghost" data-action="add-basis-item">+ 添加一条</button>
              </div>
            </label>
          `;
        }
        if (field.key === "measurement_items") {
          let tableRows = parseTableRowsFromBlock(String(f.measurement_items || ""));
          if (!tableRows || tableRows.length < 2) {
            const normalized = normalizeMeasurementItemsText(item, f);
            if (normalized) {
              f.measurement_items = normalized;
              tableRows = parseTableRowsFromBlock(normalized);
            }
          }
          if (!tableRows || tableRows.length < 2) {
            tableRows = buildFallbackMeasurementRows(String(f.measurement_items || ""));
            f.measurement_items = tableRows.map((row) => row.join("\t")).join("\n");
          }
          const [header, ...body] = tableRows;
          const matchInfo = buildMeasurementCatalogMatchInfo(tableRows);
          const headHtml = `
            <tr>

    async function renderSourcePreview(item) {
      if (!item) {
        setPreviewPlaceholder("sourcePreview", "证书模板预览未加载");
        return;
      }
      try {
        revokeBlobUrl("source");
        const ext = extFromName(item.fileName);
        if (item.isRecordRow) await ensureSourceFileId(item);
        if (ext === ".xlsx") {
          await ensureSourceFileId(item);
          const fileKey = String(item.fileId || item.fileName || "");
          const preferSheet = String(item.sheetName || state.excelPreviewSheetByFileId[fileKey] || "").trim();
          const preview = await runExcelPreview(item.fileId, preferSheet);
          const sheetNames = Array.isArray(preview.sheet_names) ? preview.sheet_names.map((x) => String(x || "").trim()).filter(Boolean) : [];
          const currentSheetName = String(preview.sheet_name || "").trim();
          if (fileKey && currentSheetName) state.excelPreviewSheetByFileId[fileKey] = currentSheetName;
          const title = String(preview.title || "").trim();
          const headers = Array.isArray(preview.headers) ? preview.headers : [];
          const rows = Array.isArray(preview.rows) ? preview.rows : [];
          const rowNumbers = Array.isArray(preview.row_numbers) ? preview.row_numbers.map((x) => Number(x || 0) || 0) : [];
          if (!headers.length) {
            setPreviewPlaceholder("sourcePreview", "Excel 无可预览内容");
            return;
          }
          const targetRowNumber = Number(item.rowNumber || 0) || 0;
          const matchSheet = !item.sheetName || !currentSheetName || String(item.sheetName) === currentSheetName;
          const rowIsTarget = (rowNo) => !!(targetRowNumber > 0 && matchSheet && rowNo === targetRowNumber);
          const thead = `<tr><th>行号</th>${headers.map((h) => `<th>${escapeHtml(String(h || ""))}</th>`).join("")}</tr>`;
          const tbody = rows.map((r, idx) => {
            const rowNo = rowNumbers[idx] || 0;
            const located = rowIsTarget(rowNo);
            return `<tr data-row-number="${rowNo}" class="${located ? "located" : ""}"><td>${rowNo > 0 ? rowNo : "-"}</td>${r.map((c) => `<td>${escapeHtml(toDateOnlyDisplay(c))}</td>`).join("")}</tr>`;
          }).join("");
          const headTitle = escapeHtml(title || currentSheetName || "Excel预览");
          const sheetSelectHtml = sheetNames.length > 1
            ? `<label>Sheet：<select id="excelPreviewSheetSelect">${sheetNames.map((name) => `<option value="${escapeAttr(name)}" ${name === currentSheetName ? "selected" : ""}>${escapeHtml(name)}</option>`).join("")}</select></label>`
            : "";
          const tailText = preview.truncated
            ? `仅预览前 ${rows.length} 行，实际共 ${preview.total_rows} 行`
            : "";
          const locateMiss = targetRowNumber > 0 && !rows.some((_, idx) => rowIsTarget(rowNumbers[idx] || 0))
            ? `，当前记录行 ${targetRowNumber} 未在预览范围内`
            : "";
          const tail = (tailText || locateMiss)
            ? `<div class="placeholder" style="padding:6px;">${escapeHtml(`${tailText}${locateMiss}`.replace(/^，/, ""))}</div>`
            : "";
          $("sourcePreview").innerHTML = `<div class="excel-preview-wrap"><div class="excel-preview-head"><span>${headTitle}</span><span class="excel-meta">${sheetSelectHtml || ""}</span></div><table class="excel-preview-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>${tail}</div>`;
          const locatedRow = $("sourcePreview").querySelector("tr.located");
          if (locatedRow && typeof locatedRow.scrollIntoView === "function") {
            locatedRow.scrollIntoView({ block: "center", behavior: "smooth" });
          }
          return;
        }
        const sourceBlob = item.fileId ? await fetchBlob(`/api/upload/${item.fileId}/download`) : item.file;
        if (ext === ".docx") {
          await renderDocx("sourcePreview", await sourceBlob.arrayBuffer());
        } else if ([".jpg", ".jpeg", ".png", ".bmp", ".webp", ".tif", ".tiff", ".heic", ".heif", ".pic"].includes(ext)) {
          const url = URL.createObjectURL(sourceBlob);
          state.blobUrls.source = url;
          $("sourcePreview").innerHTML = `<img alt="source" src="${url}" />`;
        } else if (ext === ".pdf") {
          const url = URL.createObjectURL(sourceBlob);
          state.blobUrls.source = url;
          $("sourcePreview").innerHTML = `<iframe src="${url}"></iframe>`;
        } else {
          setPreviewPlaceholder("sourcePreview", "该类型不支持证书模板预览");
        }
      } catch (error) {
        setPreviewPlaceholder("sourcePreview", `证书模板预览失败：${error.message || "unknown"}`);
      }
    }

    async function renderTargetPreview(item) {
      if (!item) {
        setPreviewPlaceholder("targetPreview", "原始记录预览未加载");
        return;
      }
      try {
        if (!item.reportDownloadUrl) {
          if (!item.templateName) {
            setPreviewPlaceholder("targetPreview", "原始记录预览未加载");
            return;
          }
          revokeBlobUrl("target");
          const tplBlob = await fetchBlob(`/api/templates/download?template_name=${encodeURIComponent(item.templateName)}`);
          const tplExt = extFromName(item.templateName);
          if (tplExt === ".docx") {
            const docxReady = await ensureDocxLib();
            if (docxReady) {
              await renderDocx("targetPreview", await tplBlob.arrayBuffer());
            } else {
              const data = await runTemplateTextPreview(item.templateName);
              const text = String((data && data.text) || "").trim();
              const truncated = !!(data && data.truncated);
              const tail = truncated ? "\n\n[文本过长，已截断]" : "";
              $("targetPreview").innerHTML = `<div style="padding:10px;white-space:pre-wrap;line-height:1.5;font-size:12px;">${escapeHtml(text || "模板文本预览为空")}${escapeHtml(tail)}</div>`;
            }
          } else {
            const url = URL.createObjectURL(tplBlob);
            state.blobUrls.target = url;
            $("targetPreview").innerHTML = `<iframe src="${url}"></iframe>`;
          }
          return;
        }
        revokeBlobUrl("target");
        const blob = await fetchBlob(item.reportDownloadUrl);
        const ext = extFromName(item.reportFileName || item.templateName || item.fileName);
        if (ext === ".docx") {
          await renderDocx("targetPreview", await blob.arrayBuffer());
        } else {
          const url = URL.createObjectURL(blob);
          state.blobUrls.target = url;
          $("targetPreview").innerHTML = `<iframe src="${url}"></iframe>`;
        }

        setPreviewPlaceholder("targetPreview", `原始记录预览失败：${error.message || "unknown"}`);
      }
    }

    async function readDirectoryEntries(reader) {
      const all = [];
      while (true) {
        const chunk = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
        if (!chunk || !chunk.length) break;
        all.push(...chunk);
      }
      return all;
    }

    async function filesFromEntry(entry) {
      if (!entry) return [];
      if (entry.isFile) {
        const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
        return file ? [file] : [];
      }
      if (entry.isDirectory) {
        const entries = await readDirectoryEntries(entry.createReader());
        const nested = await Promise.all(entries.map((x) => filesFromEntry(x)));
        return nested.flat();
      }
      return [];
    }

    async function filesFromDataTransfer(dt) {
      if (!dt) return [];
      const items = Array.from(dt.items || []);
      if (items.length && items.some((x) => typeof x.webkitGetAsEntry === "function")) {
        const entries = items
          .map((x) => (typeof x.webkitGetAsEntry === "function" ? x.webkitGetAsEntry() : null))
          .filter(Boolean);
        if (entries.length) {
          const groups = await Promise.all(entries.map((entry) => filesFromEntry(entry)));
          return groups.flat();
        }
      }
      return Array.from(dt.files || []);
    }

    function bindEvents() {
      const addFilesToQueue = (files) => {
        if (!files.length) return;
        const supported = files.filter((f) => isSupportedFile(f));
        const skipped = files.length - supported.length;
        const extSet = new Set(supported.map((f) => extFromName((f && f.name) || "")));
        if (!supported.length) {
          setStatus("未发现可识别文件");
          if (skipped > 0) appendLog(`拖拽/上传中有 ${skipped} 个不支持文件已忽略`);
          return;
        }
        supported.forEach((f) => state.queue.push(createQueueItem(f)));
        renderQueue();
        renderTemplateSelect();
        setStatus(`已加入队列：${supported.length} 个`);
        appendLog(`新增 ${supported.length} 个文件到队列`);
        if (extSet.size > 1) appendLog("提示：本次上传包含多种来源类型，建议按同类型分批上传。");
        if (skipped > 0) appendLog(`已忽略 ${skipped} 个不支持文件`);
      };

      $("uploadBtn").addEventListener("click", (event) => {
        if (state.busy) return;
        event.preventDefault();
        $("sourceFiles").click();

      });

      $("catalogDetailMask").addEventListener("click", (event) => {

      });

      $("sourceFiles").addEventListener("change", async () => {
        const files = Array.from($("sourceFiles").files || []);
        addFilesToQueue(files);
        $("sourceFiles").value = "";
        if (!state.busy) await processAllPending();
      });

      $("instrumentCatalogFile").addEventListener("change", async () => {
        const file = ($("instrumentCatalogFile").files || [])[0];
        $("instrumentCatalogFile").value = "";
        if (!file || state.busy) return;
        try {
          setLoading(true, `解析计量标准器具目录：${file.name}`);
          const data = await parseInstrumentCatalog(file);
          setInstrumentCatalog((data && data.names) || [], file.name || "", (data && data.rows) || []);
          setStatus(`计量标准器具目录已装填：${((data && data.total) || 0)} 项`);
          appendLog(`计量标准器具目录装填完成 ${file.name}：${((data && data.total) || 0)} 项`);
        } catch (error) {
          setStatus(`计量标准器具目录解析失败：${error.message || "unknown"}`);
          appendLog(`计量标准器具目录解析失败 ${file.name}：${error.message || "unknown"}`);

          setLoading(false);
        }

      $("clearInstrumentCatalogBtn").addEventListener("click", () => {

        setInstrumentCatalog([], "");
        setStatus("计量标准器具目录已清除");
      });

      const queueListEl = $("queueList");

      queueListEl.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const sortBtn = target.closest(".th-sort-btn");
        if (sortBtn instanceof HTMLElement) {
          const key = sortBtn.getAttribute("data-sort-key") || "";
          if (!key) return;
          if (state.listFilter.sortKey === key) {
            state.listFilter.sortDir = state.listFilter.sortDir === "desc" ? "asc" : "desc";
          } else {
            state.listFilter.sortKey = key;
            state.listFilter.sortDir = "asc";
          }
          $("sortKey").value = state.listFilter.sortKey;
          $("sortDir").value = state.listFilter.sortDir;
          renderQueue();
          return;
        }
        const filterTrigger = target.closest(".th-filter-trigger");
        if (filterTrigger instanceof HTMLElement) {
          const key = filterTrigger.getAttribute("data-filter-key") || "";
          if (!key) return;
          state.listFilter.activeFilterKey = state.listFilter.activeFilterKey === key ? "" : key;
          renderQueue();
          return;
        }
        const filterActBtn = target.closest(".th-filter-act");
        if (filterActBtn instanceof HTMLElement) {
          const key = filterActBtn.getAttribute("data-filter-key") || "";
          const act = filterActBtn.getAttribute("data-filter-act") || "";
          if (!key || !act) return;
          const options = getColumnFilterOptionEntries(key);
          const allTokens = options.map((x) => x.token);
          let next = [];
          if (act === "all") next = allTokens;
          if (act === "clear") next = [];
          if (act === "only_blank") next = allTokens.includes(FILTER_BLANK_TOKEN) ? [FILTER_BLANK_TOKEN] : [];
          if (act === "only_non_blank") next = allTokens.filter((x) => x !== FILTER_BLANK_TOKEN);
          const nextFilters = { ...(state.listFilter.columnFilters || {}) };
          if (next.length) nextFilters[key] = next;
          else delete nextFilters[key];
          state.listFilter.columnFilters = nextFilters;
          state.listFilter.activeFilterKey = key;
          renderQueue();
          return;
        }
        if (target.closest(".th-filter-menu") || target.closest(".th-filter-option")) return;
        if (target.closest(".row-check") || target.closest("#selectAllVisible")) return;
        const row = target.closest("tr[data-id]");
        if (!row) return;
        const id = row.getAttribute("data-id") || "";
        if (!id) return;
        state.listFilter.activeFilterKey = "";
        state.activeId = id;
        renderQueue();
        renderTemplateSelect();
        await renderPreviews();
      });

      queueListEl.addEventListener("change", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.matches(".th-filter-option")) {
          const key = target.getAttribute("data-filter-key") || "";
          const token = target.getAttribute("data-filter-token") || "";
          if (!key || !token) return;
          const current = Array.isArray((state.listFilter.columnFilters || {})[key])
            ? (state.listFilter.columnFilters || {})[key].map((x) => String(x || "")).filter(Boolean)
            : [];
          const nextSet = new Set(current);
          if (target.checked) nextSet.add(token);
          else nextSet.delete(token);
          const next = Array.from(nextSet);
          const nextFilters = { ...(state.listFilter.columnFilters || {}) };
          if (next.length) nextFilters[key] = next;
          else delete nextFilters[key];
          state.listFilter.columnFilters = nextFilters;
          state.listFilter.activeFilterKey = key;
          renderQueue();
          return;
        }
        if (target.matches(".row-check")) {
          const id = target.getAttribute("data-id") || "";

          if (target.checked) state.selectedIds.add(id);
          else state.selectedIds.delete(id);

          visibleItems.forEach((item) => {

            else state.selectedIds.delete(item.id);

      document.addEventListener("click", (event) => {
        if (!state.listFilter.activeFilterKey) return;
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest(".th-filter-trigger") || target.closest(".th-filter-menu")) return;
        state.listFilter.activeFilterKey = "";
        renderQueue();
      });

      const splitterEl = $("listDetailSplitter");
      let splitterDragging = false;
      let splitterStartY = 0;
      let splitterStartHeight = 0;

      const setQueueListHeight = (height) => {
        const minHeight = 140;
        const maxHeight = Math.max(minHeight, Math.floor(window.innerHeight * 0.72));
        const nextHeight = Math.max(minHeight, Math.min(maxHeight, Math.round(height)));
        queueListEl.style.height = `${nextHeight}px`;
      };

      if (splitterEl) {
        splitterEl.addEventListener("mousedown", (event) => {
          if (event.button !== 0) return;
          splitterDragging = true;
          splitterStartY = event.clientY;
          splitterStartHeight = queueListEl.getBoundingClientRect().height;
          document.body.style.cursor = "ns-resize";
          document.body.style.userSelect = "none";
          event.preventDefault();
        });
      }

      document.addEventListener("mousemove", (event) => {
        if (!splitterDragging) return;
        const delta = event.clientY - splitterStartY;
        setQueueListHeight(splitterStartHeight + delta);
      });

      document.addEventListener("mouseup", () => {
        if (!splitterDragging) return;
        splitterDragging = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });

      let dragDepth = 0;
      const showDropState = () => queueListEl.classList.add("drop-active");
      const hideDropState = () => queueListEl.classList.remove("drop-active");

      queueListEl.addEventListener("dragenter", (event) => {
        event.preventDefault();
        dragDepth += 1;
        showDropState();
      });

      queueListEl.addEventListener("dragover", (event) => {
        event.preventDefault();
        if (event.dataTransfer) event.dataTransfer.dropEffect = "copy";
        showDropState();
      });

      queueListEl.addEventListener("dragleave", (event) => {
        event.preventDefault();
        dragDepth = Math.max(0, dragDepth - 1);
        if (dragDepth === 0) hideDropState();
      });

      queueListEl.addEventListener("drop", async (event) => {
        event.preventDefault();
        dragDepth = 0;
        hideDropState();
        if (state.busy) return;
        try {
          const files = await filesFromDataTransfer(event.dataTransfer);
          addFilesToQueue(files);
          if (!state.busy) await processAllPending();
        } catch (error) {
          setStatus(`拖拽失败：${error.message || "unknown"}`);
          appendLog(`拖拽失败：${error.message || "unknown"}`);
        }
      });

      const sourceViewPreviewBtn = $("sourceViewPreviewBtn");
      if (sourceViewPreviewBtn) {
        sourceViewPreviewBtn.addEventListener("click", () => {
          if (!getActiveItem()) return;
          setSourceViewMode("preview");
        });
      }

      const sourceViewFormBtn = $("sourceViewFormBtn");
      if (sourceViewFormBtn) {
        sourceViewFormBtn.addEventListener("click", () => {
          if (!getActiveItem()) return;
          setSourceViewMode("fields");
        });
      }

      const sourceFieldListEl = $("sourceFieldList");
      if (sourceFieldListEl) {
        sourceFieldListEl.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;
          const toggleBtn = target.closest("[data-group-toggle]");
          if (!(toggleBtn instanceof HTMLElement)) return;
          const groupKey = String(toggleBtn.getAttribute("data-group-key") || "").trim();
          if (!groupKey) return;
          state.sourceFieldGroupCollapsed[groupKey] = !state.sourceFieldGroupCollapsed[groupKey];
          renderSourceFieldList(getActiveItem());
        });
      }

      const rightTabFieldBtn = $("rightTabFieldBtn");
      if (rightTabFieldBtn) {
        rightTabFieldBtn.addEventListener("click", () => {
          if (!getActiveItem()) return;
          setRightViewMode("field");
        });
      }

      const rightTabPreviewBtn = $("rightTabPreviewBtn");
      if (rightTabPreviewBtn) {
        rightTabPreviewBtn.addEventListener("click", () => {
          if (!getActiveItem()) return;
          setRightViewMode("preview");
        });
      }

      $("sourcePreview").addEventListener("change", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (!target.matches("#excelPreviewSheetSelect")) return;
        const item = getActiveItem();
        if (!item) return;
        const sheetName = String((target instanceof HTMLSelectElement ? target.value : "") || "").trim();
        const fileKey = String(item.fileId || item.fileName || "");
        if (fileKey) state.excelPreviewSheetByFileId[fileKey] = sheetName;
        await renderSourcePreview(item);
      });

      const handleTargetFieldChange = (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (!(target instanceof HTMLInputElement) && !(target instanceof HTMLTextAreaElement) && !(target instanceof HTMLSelectElement)) return;
        const key = String(target.getAttribute("data-field") || "").trim();
        if (!key) return;
        const item = getActiveItem();
        if (!item) return;
        if (!item.fields) item.fields = createEmptyFields();
        const rebuildMeasurementItemsFromCells = () => {
          const tableRows = parseTableRowsFromBlock(String(item.fields.measurement_items || ""));
          if (!tableRows || tableRows.length < 2) return false;
          const [header, ...body] = tableRows;
          const rebuilt = [header, ...body].map((row) => row.map((x) => String(x || "").trim()).join("\t")).join("\n");
          item.fields.measurement_items = rebuilt;
          return true;
        };
        if (key === "basis_standard_item") {
          const normalizeCode = (code) => String(code || "")
            .replace(/\s+/g, " ")
            .replace(/\s*\/\s*/g, "/")
            .replace(/\/\s*T\s*/ig, "/T ")
            .trim();
          const idx = Number.parseInt(String(target.getAttribute("data-index") || "-1"), 10);
          const current = Array.isArray(item.fields.basis_standard_items) ? [...item.fields.basis_standard_items] : [];
          while (current.length <= idx) current.push("");
          current[idx] = normalizeCode(target.value || "");
          const next = current.map((x) => normalizeCode(x)).filter(Boolean);
          item.fields.basis_standard_items = next;
          item.fields.basis_standard = next.join("\n");
          renderTargetFieldForm(item);
          applyTargetFieldProblemStyles(item);
          renderQueue();
          return;
        }
        if (key === "measurement_item_cell") {
          const rowIdx = Number.parseInt(String(target.getAttribute("data-row") || "-1"), 10);
          const colIdx = Number.parseInt(String(target.getAttribute("data-col") || "-1"), 10);
          const tableRows = parseTableRowsFromBlock(String(item.fields.measurement_items || ""));
          if (!tableRows || tableRows.length < 2) return;
          const header = tableRows[0];
          const body = tableRows.slice(1).map((row) => [...row]);
          if (rowIdx < 0 || rowIdx >= body.length) return;
          if (colIdx < 0 || colIdx >= body[rowIdx].length) return;
          body[rowIdx][colIdx] = String(target.value || "").trim();
          if (String(target.getAttribute("data-role") || "") === "measurement-item-name") {
            const token = normalizeCatalogToken(body[rowIdx][colIdx]);
            const catalogRow = token ? state.instrumentCatalogRowByToken.get(token) : null;
            if (catalogRow) {
              const idx = getMeasurementHeaderIndexes(header);
              if (idx.modelIdx >= 0 && idx.modelIdx < body[rowIdx].length && catalogRow.model) body[rowIdx][idx.modelIdx] = String(catalogRow.model || "").trim();
              if (idx.codeIdx >= 0 && idx.codeIdx < body[rowIdx].length && catalogRow.code) body[rowIdx][idx.codeIdx] = String(catalogRow.code || "").trim();
            }
          }
          item.fields.measurement_items = [header, ...body].map((row) => row.join("\t")).join("\n");
          if (!(item.fields.measurement_item_count || "").trim()) {
            item.fields.measurement_item_count = String(body.length);
          }
          rebuildMeasurementItemsFromCells();
          renderTargetFieldForm(item);
          renderQueue();
          return;
        }
        if (key === "general_check_cell") {
          const rowIdx = Number.parseInt(String(target.getAttribute("data-row") || "-1"), 10);
          const colIdx = Number.parseInt(String(target.getAttribute("data-col") || "-1"), 10);
          const rows = parseGeneralCheckRowsForEditor(String(item.fields.general_check_full || ""));
          const working = (rows.length ? rows : [["", ""]]).map((row) => [String((row && row[0]) || ""), String((row && row[1]) || "")]);
          if (rowIdx < 0 || rowIdx >= working.length) return;
          if (colIdx < 0 || colIdx > 1) return;
          working[rowIdx][colIdx] = String(target.value || "");
          item.fields.general_check_full = buildGeneralCheckTextFromRows(working);
          item.fields.general_check = item.fields.general_check_full;
          renderQueue();
          return;
        }
        const value = target.value || "";
        item.fields[key] = value;
        if (["receive_date", "calibration_date", "release_date"].includes(key)) {
          const inferred = inferDateTriplet({
            receiveDate: String(item.fields.receive_date || ""),
            calibrationDate: String(item.fields.calibration_date || ""),
            releaseDate: String(item.fields.release_date || ""),
          });
          if (!isCompleteDateText(item.fields.receive_date || "") && inferred.receiveDate) {
            item.fields.receive_date = inferred.receiveDate;
          }
          if (!isCompleteDateText(item.fields.calibration_date || "") && inferred.calibrationDate) {
            item.fields.calibration_date = inferred.calibrationDate;
          }
          if (!isCompleteDateText(item.fields.release_date || "") && inferred.releaseDate) {
            item.fields.release_date = inferred.releaseDate;
          }
        }
        if (key === "general_check_full") {
          item.fields.general_check = cleanBlockText(item.fields.general_check_full || "");
        }
        if (key === "raw_record") item.rawText = value;
        if (key === "raw_record") maybeCopyGeneralCheckForBlankTemplate(item);
        if (key === "measurement_items" && !(item.fields.measurement_item_count || "").trim()) {
          const count = String(value).split("\n").map((x) => x.trim()).filter(Boolean).length;
          item.fields.measurement_item_count = count > 0 ? String(count) : "";
        }
        if (["device_name", "device_model", "device_code"].includes(key)) {
          item.category = inferCategory(item);
        }
        if (item.templateName) {
          const validation = validateItemForGeneration(item, "certificate_template");
          if (!validation.ok) applyIncompleteState(item, validation);
          else if (item.status === "incomplete") {
            item.status = "ready";
            item.message = buildCategoryMessage(item, "字段已补全，可生成");
          }
        }
        applyTargetFieldProblemStyles(item);
        renderQueue();
      };
      $("targetFieldForm").addEventListener("input", handleTargetFieldChange);
      $("targetFieldForm").addEventListener("change", handleTargetFieldChange);
      $("targetFieldForm").addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const action = String(target.getAttribute("data-action") || "").trim();
        if (!action) return;
        const item = getActiveItem();
        if (!item) return;
        if (!item.fields) item.fields = createEmptyFields();
        if (action === "match-measurement-items") {
          const tableRows = parseTableRowsFromBlock(String(item.fields.measurement_items || ""));
          if (!tableRows || tableRows.length < 2) return;
          if (!state.instrumentCatalogRows || !state.instrumentCatalogRows.length) {
            appendLog("目录未就绪：请先装填计量标准器具目录");
            return;
          }
          const [header, ...body] = tableRows;
          const { nameIdx, modelIdx, codeIdx } = getMeasurementHeaderIndexes(header);
          const nextBody = body.map((row) => [...row]);
          let changed = 0;
          for (let i = 0; i < nextBody.length; i += 1) {
            const row = nextBody[i];
            const token = normalizeCatalogToken(String(row[nameIdx] || ""));
            const catalogRow = token ? state.instrumentCatalogRowByToken.get(token) : null;
            if (!catalogRow) continue;
            const before = `${row[nameIdx] || ""}|${row[modelIdx] || ""}|${row[codeIdx] || ""}`;
            if (nameIdx >= 0 && catalogRow.name) row[nameIdx] = String(catalogRow.name || "").trim();
            if (modelIdx >= 0 && catalogRow.model) row[modelIdx] = String(catalogRow.model || "").trim();
            if (codeIdx >= 0 && catalogRow.code) row[codeIdx] = String(catalogRow.code || "").trim();
            const after = `${row[nameIdx] || ""}|${row[modelIdx] || ""}|${row[codeIdx] || ""}`;
            if (before !== after) changed += 1;
          }
          item.fields.measurement_items = [header, ...nextBody].map((row) => row.join("\t")).join("\n");
          renderTargetFieldForm(item);
          applyTargetFieldProblemStyles(item);
          renderQueue();
          appendLog(changed > 0 ? `器具目录一键配对完成：更新 ${changed} 行` : "器具目录一键配对完成：无可更新项");
          return;
        }
        const normalizeCode = (code) => String(code || "")
          .replace(/\s+/g, " ")
          .replace(/\s*\/\s*/g, "/")
          .replace(/\/\s*T\s*/ig, "/T ")
          .trim();
        const current = Array.isArray(item.fields.basis_standard_items) ? [...item.fields.basis_standard_items] : [];
        if (action === "add-basis-item") {
          current.push("");
          item.fields.basis_standard_items = current;
          item.fields.basis_standard = current.map((x) => normalizeCode(x)).filter(Boolean).join("\n");
          renderTargetFieldForm(item);
          return;
        }
        if (action === "remove-basis-item") {
          const idx = Number.parseInt(String(target.getAttribute("data-index") || "-1"), 10);
          if (idx < 0 || idx >= current.length) return;
          current.splice(idx, 1);
          const next = current.map((x) => normalizeCode(x)).filter(Boolean);
          item.fields.basis_standard_items = next;
          item.fields.basis_standard = next.join("\n");
          renderTargetFieldForm(item);
        }
      });

      let templateApplyTimer = null;
      const applyTemplateSelection = async ({ commit = false } = {}) => {
        const item = getActiveItem();
        if (!item) return;
        const raw = ($("templateSearch").value || "").trim();
        if (!raw) {
          if (!commit) return;
          $("templateName").value = "";
          item.templateName = "";
          item.reportId = "";
          item.reportDownloadUrl = "";
          item.reportFileName = "";
          item.status = "ready";
          item.message = "未选择模板";
          renderQueue();
          renderTargetFieldForm(item);
          await renderTargetPreview(item);
          return;
        }
        const selected = state.templates.includes(raw) ? raw : "";
        if (!selected) return;
        if (item.templateName === selected) return;
        $("templateName").value = selected;
        item.templateName = selected;
        maybeCopyGeneralCheckForBlankTemplate(item);
        item.reportId = "";
        item.reportDownloadUrl = "";
        item.reportFileName = "";
        const validation = validateItemForGeneration(item, "certificate_template");
        if (!validation.ok) applyIncompleteState(item, validation);
        else {
          item.status = "ready";
          item.message = item.templateName ? "模板已手动选择" : "未选择模板";
        }
        renderQueue();
        renderTargetFieldForm(item);
        await renderTargetPreview(item);
      };
      $("templateSearch").addEventListener("change", () => { applyTemplateSelection({ commit: true }); });
      $("templateSearch").addEventListener("blur", () => { applyTemplateSelection({ commit: true }); });
      $("templateSearch").addEventListener("input", () => {
        if (templateApplyTimer) clearTimeout(templateApplyTimer);
        templateApplyTimer = setTimeout(() => {
          applyTemplateSelection();
          const item = getActiveItem();
          const blankBtn = $("useBlankTemplateBtn");
          if (blankBtn && item) {
            const raw = ($("templateSearch").value || "").trim();
            const hasExact = !!state.templates.includes(raw);
            const blankName = resolveBlankTemplateName();
            blankBtn.style.display = !hasExact && !!blankName ? "inline-block" : "none";
          }
        }, 360);
      });

      $("useBlankTemplateBtn").addEventListener("click", async () => {
        const item = getActiveItem();
        if (!item || state.busy) return;
        const blankName = resolveBlankTemplateName();
        if (!blankName) return;
        $("templateName").value = blankName;
        $("templateSearch").value = blankName;
        item.templateName = blankName;
        maybeCopyGeneralCheckForBlankTemplate(item);
        item.reportId = "";
        item.reportDownloadUrl = "";
        item.reportFileName = "";
        const validation = validateItemForGeneration(item, "certificate_template");
        if (!validation.ok) applyIncompleteState(item, validation);
        else {
          item.status = "ready";
          item.message = "已选择空白模板";
        }
        renderQueue();
        renderTemplateSelect();
        renderTargetFieldForm(item);
        await renderTargetPreview(item);
      });

      $("togglePreviewFullscreenBtn").addEventListener("click", () => {
        if (!getActiveItem()) return;
        setPreviewFullscreen(!state.previewFullscreen);
      });
      $("detailPanelHead").addEventListener("dblclick", () => {
        if (!getActiveItem()) return;
        setPreviewFullscreen(!state.previewFullscreen);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.previewFullscreen) {
          setPreviewFullscreen(false);
          return;
        }
        if (event.key === "Escape") setCatalogDetailVisible(false);
      });

      $("runGenerateAllBtn").addEventListener("click", async () => {
        if (state.busy) return;
        const selected = getSelectedNormalItems().map((x) => x.id);
        await generateAllReady(selected);
      });

      $("refreshAllRecognitionBtn").addEventListener("click", async () => {
        if (state.busy) return;
        await refreshAllRecognition();
      });

      $("runBatchBtn").addEventListener("click", async () => {
        if (state.busy) return;
        const selected = getSelectedNormalItems().map((x) => x.id);
        await exportAll(selected);
      });

      $("clearQueueBtn").addEventListener("click", () => {
        if (state.busy) return;
        state.queue = [];
        state.selectedIds.clear();
        state.activeId = "";
        setPreviewFullscreen(false);
        clearPreprocessProgress();
        state.excelPreviewSheetByFileId = {};
        renderQueue();
        renderTemplateSelect();
        setPreviewPlaceholder("sourcePreview", "证书模板预览未加载");
        $("sourceFieldList").innerHTML = '<div class="placeholder">识别字段未加载</div>';
        setPreviewPlaceholder("targetPreview", "原始记录预览未加载");
        setStatus("队列已清空");
      });

      $("generatePreviewBtn").addEventListener("click", async () => {
        const item = getActiveItem();
        if (!item || state.busy) return;
        const generateMode = getGenerateMode();
        try {
          setLoading(true, generateMode === "source_file" ? `导出证书模板来源文件：${item.fileName}` : `生成原始记录中：${item.fileName}`);
          await generateItem(item, generateMode);
          await renderPreviews();
          setStatus(generateMode === "source_file" ? `已导出证书模板来源文件：${item.fileName}` : `已生成原始记录：${item.fileName}`);
        } catch (error) {
          if (item.status !== "incomplete") {
            item.status = "error";
            item.message = error.message || "生成失败";
          }
          renderQueue();
          appendLog(`生成失败 ${item.fileName}：${item.message}`);
          setStatus(`生成失败：${item.fileName}`);
        } finally {
          setLoading(false);
        }
      });

      $("downloadCurrentBtn").addEventListener("click", async () => {
        const item = getActiveItem();
        if (!item || !item.reportDownloadUrl || state.busy) return;
        try {
          setLoading(true, `导出中：${item.fileName}`);
          await triggerDownload(item.reportDownloadUrl, item.reportFileName || item.templateName || item.fileName || "report.docx");
          item.status = "generated";
          item.message = "已导出";
          renderQueue();
          setStatus(`已导出：${item.fileName}`);
        } catch (error) {
          setStatus(`导出失败：${item.fileName}`);
        } finally {
          setLoading(false);
        }
      });

      $("runExcelBatchBtn").addEventListener("click", async () => {
        const item = getActiveItem();
        if (!item || state.busy) return;
        try {
          setLoading(true, `Excel批量中：${item.fileName}`);
          await runExcelBatch(item);
          setStatus(`Excel批量完成：${item.fileName}`);
        } catch (error) {
          item.status = "error";
          item.message = error.message || "Excel 批量失败";
          renderQueue();
          setStatus(`Excel批量失败：${item.fileName}`);
        } finally {
          setLoading(false);
        }
      });

      $("filterKeyword").addEventListener("input", () => {
        state.listFilter.keyword = $("filterKeyword").value || "";
        renderQueue();
      });
      $("filterStatus").addEventListener("change", () => {
        state.listFilter.status = $("filterStatus").value || "";
        renderQueue();
      });
      $("sortKey").addEventListener("change", () => {
        state.listFilter.sortKey = $("sortKey").value || "";
        renderQueue();
      });
      $("sortDir").addEventListener("change", () => {
        state.listFilter.sortDir = $("sortDir").value || "asc";
        renderQueue();
      });
      $("selectVisibleBtn").addEventListener("click", () => {
        if (state.busy) return;
        getFilteredSortedQueue().forEach((item) => state.selectedIds.add(item.id));
        renderQueue();
      });
      $("clearSelectedBtn").addEventListener("click", () => {
        if (state.busy) return;
        state.selectedIds.clear();
        renderQueue();
      });
      $("removeSelectedBtn").addEventListener("click", async () => {
        if (state.busy) return;
        if (!state.selectedIds.size) return;
        const removeSet = new Set(state.selectedIds);
        const beforeCount = state.queue.length;
        state.queue = state.queue.filter((item) => !removeSet.has(item.id));
        const removedCount = beforeCount - state.queue.length;
        state.selectedIds.clear();
        if (!state.queue.length) {
          state.activeId = "";
          setPreviewPlaceholder("sourcePreview", "证书模板预览未加载");
          $("sourceFieldList").innerHTML = '<div class="placeholder">识别字段未加载</div>';
          setPreviewPlaceholder("targetPreview", "原始记录预览未加载");
        } else if (!state.queue.some((item) => item.id === state.activeId)) {
          state.activeId = state.queue[0].id;
          await renderPreviews();
        }
        renderQueue();
        renderTemplateSelect();
        setStatus(`已移除 ${removedCount} 条记录`);
        appendLog(`已移除选中记录：${removedCount} 条`);
      });
    }

    (async function init() {
      setLoading(true, "初始化...");
      try {
        await loadRuntimeConfig();
        await loadTemplates();
        try {
          bindEvents();
        } catch (bindError) {
          appendLog(`事件绑定异常：${bindError.message || "unknown"}`);
        }
        await autoLoadInstrumentCatalog();
        renderQueue();
        setPreviewPlaceholder("sourcePreview", "证书模板预览未加载");
        $("sourceFieldList").innerHTML = '<div class="placeholder">识别字段未加载</div>';
        setPreviewPlaceholder("targetPreview", "原始记录预览未加载");
        setStatus("就绪");
      } catch (error) {
        setStatus(`初始化失败：${error.message || "unknown"}`);
      } finally {
        setLoading(false);
      }
    })();
  </script>
</body>
</html>
