<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>证书模板与原始记录批量工具</title>
  <style>
    :root {
      --bg: #d9dde3;
      --panel: #eef1f5;
      --panel-2: #e6ebf2;
      --border: #8e99aa;
      --border-2: #6f7d91;
      --text: #1a2535;
      --muted: #4d5d73;
      --ok: #1c6b37;
      --warn: #8e5f0f;
      --err: #8f2020;
      --btn-top: #f8fbff;
      --btn-bottom: #d8e1ee;
      --btn-hover-top: #ffffff;
      --btn-hover-bottom: #c7d4e6;
      --btn-primary-top: #dff2ff;
      --btn-primary-bottom: #b9d7f3;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      font-size: 13px;
    }

    body.preview-fullscreen { overflow: hidden; }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 8px;
      padding: 8px;
      min-width: 0;
    }

    .bar,
    .panel {
      border: 1px solid var(--border-2);
      background: linear-gradient(180deg, #f4f7fb 0%, var(--panel) 100%);
      box-shadow: inset 0 1px 0 #fff;
    }

    .bar {
      padding: 8px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .bar-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 460px;
      gap: 8px;
      align-items: start;
      min-width: 0;
    }

    .bar-main { display: grid; gap: 8px; min-width: 0; }

    .log-panel {
      border: 1px dashed #b8c3d3;
      background: linear-gradient(180deg, rgba(244, 247, 251, 0.92) 0%, rgba(236, 242, 249, 0.92) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      position: static;
      width: 100%;
      z-index: 1;
      opacity: 1;
    }

    .log-panel-head {
      border-bottom: 1px dashed #b8c3d3;
      padding: 4px 6px;
      background: linear-gradient(180deg, #f9fbff 0%, var(--panel-2) 100%);
      font-weight: 700;
      color: #4a617d;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .log-panel-title {
      white-space: nowrap;
    }

    .log-head-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #344b68;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .toolbar-groups {
      display: grid;
      grid-template-columns: max-content minmax(520px, 1fr);
      gap: 8px;
      align-items: start;
    }

    .toolbar-group {
      border: 1px dashed #b8c3d3;
      background: linear-gradient(180deg, #f8fbff 0%, #edf2f9 100%);
      padding: 6px;
      display: grid;
      gap: 6px;
      min-width: 0;
      align-content: start;
    }

    .toolbar-group.compact {
      width: max-content;
      min-width: 0;
    }

    .toolbar-group.catalog-compact {
      width: max-content;
      min-width: 0;
    }

    .toolbar-group-title {
      font-size: 12px;
      color: #4a617d;
      font-weight: 700;
      border-bottom: 1px dashed #c8d2e1;
      padding-bottom: 3px;
    }

    .toolbar-group-title.with-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .toolbar-row.no-wrap {
      flex-wrap: nowrap;
    }

    .meta-compact {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      color: #344b68;
      font-size: 12px;
    }

    .meta-compact b {
      color: #173455;
    }

    .upload-standalone {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-in-log {
      display: grid;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px dashed #b8c3d3;
      background: linear-gradient(180deg, #f9fbff 0%, var(--panel-2) 100%);
      grid-template-columns: 1fr;
      align-items: start;
    }

    .icon-btn {
      min-width: 34px;
      width: 34px;
      padding: 0;
      text-align: center;
      font-size: 16px;
      line-height: 1;
    }

    .catalog-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .catalog-ready-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #7ea2c9;
      background: linear-gradient(90deg, #e8f3ff 0%, #f2f8ff 100%);
      color: #294c72;
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 12px;
      white-space: nowrap;
    }

    .catalog-ready-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ea46a;
      box-shadow: 0 0 0 3px rgba(62, 164, 106, 0.18);
    }

    .catalog-preview {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #f9fbff 0%, #ecf1f8 100%);
      padding: 6px;
      max-height: 170px;
      overflow: auto;
      font-size: 12px;
    }

    .catalog-preview table {
      width: 100%;
      border-collapse: collapse;
    }

    .catalog-preview th,
    .catalog-preview td {
      border: 1px solid #b8c3d3;
      padding: 4px 6px;
      text-align: left;
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .catalog-detail-mask {
      position: fixed;
      inset: 0;
      background: rgba(16, 28, 45, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      padding: 16px;
    }

    .catalog-detail-mask.show { display: flex; }

    .catalog-detail-box {
      width: min(1200px, 96vw);
      max-height: 90vh;
      border: 1px solid var(--border-2);
      background: linear-gradient(180deg, #f8fbff 0%, #edf3fb 100%);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .catalog-detail-head {
      border-bottom: 1px solid var(--border);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #2d4664;
      font-weight: 700;
    }

    .catalog-detail-table-wrap {
      overflow: auto;
      padding: 0;
    }

    #catalogDetailContent {
      min-height: 100%;
    }

    .catalog-detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      background: #fff;
      margin: 0;
    }

    .catalog-detail-table th,
    .catalog-detail-table td {
      border: 1px solid #b8c3d3;
      padding: 5px 6px;
      text-align: left;
      vertical-align: top;
      min-width: 90px;
      max-width: 240px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    button {
      border: 1px solid var(--border);
      border-radius: 3px;
      height: 30px;
      padding: 0 12px;
      cursor: pointer;
      color: #102238;
      font-weight: 700;
      background: linear-gradient(180deg, var(--btn-top) 0%, var(--btn-bottom) 100%);
      box-shadow: inset 0 1px 0 #fff;
    }

    button:hover {
      background: linear-gradient(180deg, var(--btn-hover-top) 0%, var(--btn-hover-bottom) 100%);
    }

    button.primary {
      background: linear-gradient(180deg, var(--btn-primary-top) 0%, var(--btn-primary-bottom) 100%);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .opt {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      margin-right: 10px;
      user-select: none;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
    }

    .progress-row {
      display: none;
      grid-template-columns: 260px 1fr;
      gap: 8px;
      align-items: center;
      color: var(--muted);
    }

    .progress-row.show { display: grid; }

    .progress-row progress {
      width: 100%;
      height: 14px;
    }

    .tag {
      border: 1px solid var(--border);
      background: #f7faff;
      padding: 3px 8px;
      border-radius: 2px;
      color: #243a57;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 0;
      min-width: 0;
    }

    .panel {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .list-panel {
      display: block;
    }

    .list-panel .body {
      height: 200px;
      min-height: 140px;
      max-height: 72vh;
      resize: none;
      overflow: auto;
    }

    .panel-splitter {
      height: 14px;
      border: 1px solid var(--border-2);
      background: linear-gradient(180deg, #eaf0f8 0%, #d7e1ee 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: ns-resize;
      user-select: none;
    }

    .panel-splitter.hidden {
      display: none;
    }

    .panel-splitter-handle {
      min-width: 54px;
      height: 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: linear-gradient(180deg, #f8fbff 0%, #e2ebf7 100%);
      color: #365272;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      letter-spacing: 1px;
    }

    .list-panel .body.drop-active {
      background: #e9f2ff;
      outline: 2px dashed #5b84b6;
      outline-offset: -4px;
    }

    .head {
      border-bottom: 1px solid var(--border);
      padding: 6px 8px;
      background: linear-gradient(180deg, #f9fbff 0%, var(--panel-2) 100%);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .list-tools {
      border-bottom: 1px solid var(--border);
      padding: 6px 8px;
      background: linear-gradient(180deg, #f4f8ff 0%, #e7eef8 100%);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .list-tools input,
    .list-tools select {
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0 8px;
      background: #fff;
      color: var(--text);
    }

    .list-tools .small-btn {
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
    }

    .list-tools .hint {
      color: var(--muted);
      font-weight: 700;
      margin-left: 4px;
    }

    .head > * {
      min-width: 0;
    }

    .detail-panel-head-main {
      display: inline-flex;
      align-items: center;
    }

    .detail-panel-head-hint {
      margin-left: 4px;
      color: #4d5d73;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      user-select: none;
    }

    .body {
      min-height: 0;
      min-width: 0;
      overflow: auto;
      background: #f8fbff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border-right: 1px solid #c4cfde;
      border-bottom: 1px solid #c4cfde;
      padding: 6px 8px;
      white-space: nowrap;
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #dce6f4;
      color: #223d5a;
    }

    th .th-cell {
      position: relative;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 88px;
    }

    th .th-sort-btn {
      all: unset;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      cursor: pointer;
      color: inherit;
      font-weight: 700;
      line-height: 1.2;
      flex: 1;
      min-width: 0;
    }

    th .th-sort-btn:hover {
      color: #1a4c83;
    }

    th .th-sort-btn.is-active {
      color: #0f4b8f;
    }

    th .th-sort-icon {
      font-size: 11px;
      color: #5a7495;
      line-height: 1;
    }

    th .th-sort-btn.is-active .th-sort-icon {
      color: #0f4b8f;
    }

    th .th-filter-trigger {
      height: 18px;
      min-width: 30px;
      padding: 0 4px;
      border: 1px solid #a4b5ca;
      border-radius: 2px;
      background: #edf3fb;
      color: #486586;
      font-size: 11px;
      font-weight: 700;
      line-height: 16px;
      cursor: pointer;
    }

    th .th-filter-trigger:hover {
      background: #e3edf9;
    }

    th .th-filter-trigger.is-active {
      border-color: #2f6ab0;
      background: #dceaff;
      color: #1e5188;
    }

    th .th-filter-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 220px;
      max-height: 300px;
      overflow: auto;
      border: 1px solid #9eb1c7;
      background: #f8fbff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
      padding: 6px;
      z-index: 8;
    }

    th .th-filter-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }

    th .th-filter-act {
      height: 20px;
      padding: 0 6px;
      border: 1px solid #9fb2c8;
      border-radius: 2px;
      background: #edf3fb;
      color: #3d5f84;
      font-size: 11px;
      line-height: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    th .th-filter-options {
      display: grid;
      gap: 2px;
    }

    th .th-filter-opt {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      padding: 0 2px;
      font-weight: 400;
      color: #203a57;
    }

    th .th-filter-opt input {
      margin: 0;
    }

    th .th-filter-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th .th-filter-count {
      color: #5f7896;
      font-size: 11px;
    }

    tr.active { background: #e7f1ff; }
    tr:hover { background: #f2f7ff; }

    .status {
      border: 1px solid #a9b8cd;
      border-radius: 2px;
      padding: 1px 6px;
      background: #eef3fb;
      color: #2c4564;
      display: inline-block;
      font-size: 12px;
    }

    .status.ok { border-color: #9ec7a8; color: var(--ok); background: #eef9f1; }
    .status.warn { border-color: #d8be8f; color: var(--warn); background: #fff8ea; }
    .status.err { border-color: #d2a1a1; color: var(--err); background: #fff0f0; }

    .detail {
      display: grid;
      grid-template-rows: 1fr;
      gap: 8px;
      padding: 8px;
      min-height: 0;
      min-width: 0;
    }

    .detail-panel {
      display: none;
      min-height: 0;
    }

    .detail-panel.show {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .detail-panel.preview-fullscreen-mode {
      position: fixed;
      inset: 8px;
      z-index: 1200;
      max-height: none;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      background: linear-gradient(180deg, #f4f7fb 0%, var(--panel) 100%);
      border: 1px solid var(--border-2);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .row {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 8px;
      align-items: center;
    }

    .row label { color: var(--muted); font-weight: 700; }

    .row input,
    .row select {
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0 8px;
      background: #fff;
      color: var(--text);
      width: 100%;
    }

    .preview {
      border: 1px solid #b8c5d8;
      background: #fff;
      min-height: 0;
      overflow: auto;
      position: relative;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      min-height: 0;
      min-width: 0;
      height: 100%;
    }

    .preview-pane {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-height: 0;
      min-width: 0;
    }

    .source-pane {
      grid-template-rows: auto 1fr;
    }

    .source-tab-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }

    .source-tab-btn {
      height: 24px;
      padding: 0 8px;
      border: 1px solid #9eb0c7;
      border-radius: 2px;
      background: #edf3fb;
      color: #2a4a70;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      box-shadow: none;
    }

    .source-tab-btn.is-active {
      border-color: #2e67a8;
      background: #dceaff;
      color: #1b4f86;
    }

    .source-tab-panel {
      display: none;
      min-height: 0;
      height: 100%;
    }

    .source-tab-panel.is-active {
      display: block;
    }

    #sourcePreviewPanel.source-tab-panel.is-active {
      display: grid;
      min-height: 0;
    }

    #sourceFieldsPanel.source-tab-panel.is-active {
      display: grid;
      min-height: 0;
    }

    .source-recog-panel {
      border: 1px solid #b8c5d8;
      background: #edf3fb;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .source-recog-head {
      padding: 4px 8px;
      border-bottom: 1px solid #c5d3e5;
      color: #2c4564;
      font-size: 12px;
      font-weight: 700;
    }

    .source-recog-list {
      overflow: auto;
      min-height: 0;
      background: #f7faff;
      padding: 6px;
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .source-recog-item {
      border: 1px solid #ccd8e8;
      background: #fff;
      border-radius: 2px;
      padding: 4px 6px;
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 8px;
      align-items: start;
      min-width: 0;
    }

    .calib-info-layout {
      display: grid;
      gap: 4px;
    }

    .calib-info-row {
      display: grid;
      gap: 4px;
    }

    .calib-info-row.one {
      grid-template-columns: 1fr;
    }

    .calib-info-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .calib-info-row.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .calib-date-grid {
      display: inline-grid;
      grid-auto-flow: column;
      gap: 4px;
      align-items: center;
    }

    .calib-date-part {
      min-width: 34px;
      padding: 1px 4px;
      border: 1px solid #cbd7e8;
      background: #fff;
      text-align: center;
      border-radius: 2px;
      line-height: 1.3;
    }

    .calib-date-unit {
      color: #4a607f;
      font-size: 12px;
    }

    .source-recog-item.is-problem {
      border-color: #cf5a5a;
      background: #fff4f4;
    }

    .source-recog-key {
      color: #385575;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .source-recog-val {
      color: #22384f;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      min-width: 0;
    }

    .source-recog-val.is-problem {
      color: #9b2d2d;
      font-weight: 700;
    }

    .source-recog-empty {
      color: #7e93ad;
    }

    .source-recog-group {
      border: 1px solid #c3d1e4;
      background: #f3f8ff;
      padding: 6px;
      display: grid;
      gap: 4px;
    }

    .source-recog-group-title {
      font-size: 12px;
      font-weight: 700;
      color: #2f4f73;
      border-bottom: 1px solid #d8e3f2;
      padding-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .source-recog-group-title-text {
      min-width: 0;
      flex: 1 1 auto;
    }

    .source-recog-group-toggle {
      border: 1px solid #adc1da;
      background: #fff;
      color: #345779;
      width: 18px;
      height: 18px;
      line-height: 1;
      padding: 0;
      border-radius: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .source-recog-group-toggle:hover {
      background: #eef5ff;
    }

    .source-recog-group.is-collapsed {
      gap: 0;
    }

    .source-recog-block {
      border: 1px dashed #b8c8dc;
      background: #fff;
      color: #22384f;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 6px;
      min-height: 24px;
    }

    .source-recog-block-formatted {
      white-space: normal;
    }

    .source-recog-block-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .source-recog-block-table th,
    .source-recog-block-table td {
      border: 1px solid #cbd7e8;
      padding: 4px 6px;
      text-align: left;
      vertical-align: top;
      word-break: normal;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-recog-block-table.general-check-table td {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }

    .source-recog-block-table.general-check-table td:first-child {
      width: 110px;
      white-space: nowrap;
    }

    .source-recog-block-table th {
      background: #f2f7ff;
      color: #2f4f73;
      font-weight: 700;
    }

    .source-recog-block-list {
      margin: 0;
      padding: 0;
      line-height: 1.45;
      list-style: none;
      display: grid;
      gap: 4px;
    }

    .source-recog-block-list li {
      border: 1px solid #ccd8e8;
      background: #fff;
      border-radius: 2px;
      padding: 4px 6px;
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 6px;
      align-items: start;
    }

    .source-recog-block-list li::before {
      content: counter(source-recog-list-item);
      counter-increment: source-recog-list-item;
      height: 18px;
      border: 1px solid #b8c5d8;
      background: #eef3fb;
      color: #2c4564;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      border-radius: 2px;
    }

    .source-recog-block-list {
      counter-reset: source-recog-list-item;
    }

    .target-pane {
      grid-template-rows: auto 1fr;
    }

    .target-actions {
      border: 1px solid #b8c5d8;
      background: #eef3fb;
      padding: 4px 6px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
      min-width: 0;
    }

    .target-actions-label {
      color: #2c4564;
      font-weight: 700;
    }

    .target-generate-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      min-width: 0;
    }

    .target-actions select {
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0 8px;
      background: #fff;
      color: var(--text);
      min-width: 132px;
    }

    .pane-head {
      border: 1px solid #b8c5d8;
      background: #eef3fb;
      padding: 4px 6px;
      color: #2c4564;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    #activeFileText {
      max-width: min(72vw, 760px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pane-head input,
    .pane-head select {
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0 8px;
      background: #fff;
      color: var(--text);
      width: 100%;
      max-width: 380px;
    }

    .pane-hint-btn {
      height: 26px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      display: none;
    }

    .target-field-panel {
      border: 1px solid #b8c5d8;
      background: #edf3fb;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      height: 100%;
    }

    .right-tab-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .right-tab-btn {
      height: 24px;
      padding: 0 8px;
      border: 1px solid #9eb0c7;
      border-radius: 2px;
      background: #edf3fb;
      color: #2a4a70;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      box-shadow: none;
    }

    .right-tab-btn.is-active {
      border-color: #2e67a8;
      background: #dceaff;
      color: #1b4f86;
    }

    .right-tab-panel {
      display: none;
      min-height: 0;
      grid-row: 2;
    }

    .right-tab-panel.is-active {
      display: block;
      min-height: 0;
      height: 100%;
    }

    #rightPreviewPanel.right-tab-panel.is-active {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-height: 0;
    }

    .target-field-head {
      padding: 4px 8px;
      border-bottom: 1px solid #c5d3e5;
      color: #2c4564;
      font-size: 12px;
      font-weight: 700;
    }

    .target-field-form {
      height: 100%;
      overflow: auto;
      min-height: 0;
      background: #f7faff;
    }

    .source-form {
      padding: 8px;
      display: grid;
      gap: 8px;
      min-height: 100%;
    }

    .source-form-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #445d7e;
      font-weight: 700;
    }

    .source-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 8px;
    }

    .source-form-item {
      display: grid;
      gap: 4px;
    }

    .source-form-item.is-problem span {
      color: #9b2d2d;
    }

    .source-form-item.wide {
      grid-column: 1 / -1;
    }

    .source-form-item span {
      color: #3d5574;
      font-size: 12px;
      font-weight: 700;
    }

    .source-form-item input,
    .source-form-item select,
    .source-form-item textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 6px 8px;
      background: #fff;
      color: var(--text);
      font-size: 12px;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    .source-form-item input.is-problem,
    .source-form-item select.is-problem,
    .source-form-item textarea.is-problem {
      border-color: #cf5a5a;
      background: #fff4f4;
      color: #8d1f1f;
    }

    .source-form-item textarea {
      min-height: 72px;
      resize: vertical;
    }

    .measurement-table-wrap {
      border: 1px solid #c3d1e4;
      background: #fff;
      overflow: auto;
    }

    .measurement-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .measurement-toolbar-hint {
      color: #526886;
      font-size: 12px;
      font-weight: 600;
    }

    .measurement-row-mismatch td {
      background: #fff1f1;
    }

    .measurement-row-mismatch td.row-no {
      background: #ffe6e6;
      color: #8d1f1f;
    }

    .measurement-row-mismatch td input {
      background: #fff1f1;
      border-color: #d98484;
      color: #8d1f1f;
    }

    .measurement-row-mismatch td input:focus {
      outline: 1px solid #cf5a5a;
      box-shadow: 0 0 0 1px rgba(207, 90, 90, 0.25) inset;
    }

    .measurement-row-mark {
      display: inline-block;
      margin-left: 4px;
      padding: 0 4px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 700;
      color: #8d1f1f;
      background: #ffdede;
      border: 1px solid #e3a4a4;
    }

    .measurement-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 560px;
    }

    .measurement-table th,
    .measurement-table td {
      border: 1px solid #cbd7e8;
      padding: 4px;
      text-align: left;
      vertical-align: top;
      word-break: normal;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
    }

    .measurement-table th {
      background: #f2f7ff;
      color: #2f4f73;
      font-weight: 700;
    }

    .measurement-table td.row-no {
      width: 40px;
      text-align: center;
      background: #f8fbff;
      color: #3d5574;
      font-weight: 700;
    }

    .measurement-table td input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 4px 6px;
      background: #fff;
      color: var(--text);
      font-size: 12px;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    .basis-items-wrap {
      display: grid;
      gap: 6px;
    }

    .basis-item-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 6px;
      align-items: center;
    }

    .basis-item-no {
      height: 30px;
      border: 1px solid #b8c5d8;
      background: #eef3fb;
      color: #2c4564;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      border-radius: 2px;
    }

    .source-focus-groups {
      border: 1px solid #bfd0e6;
      background: #f6faff;
      padding: 6px;
      display: grid;
      gap: 6px;
      margin-bottom: 8px;
    }

    .excel-preview-wrap {
      padding: 6px;
    }

    .excel-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 2px 0 8px 0;
      color: #2d4866;
      font-weight: 700;
      flex-wrap: wrap;
    }

    .excel-preview-head .excel-meta {
      color: #5a7391;
      font-weight: 400;
      font-size: 12px;
    }

    .excel-preview-head select {
      height: 24px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0 6px;
      background: #fff;
      color: var(--text);
      max-width: 220px;
    }

    .excel-preview-table tr.located {
      background: #fff2cb;
    }

    .preview .placeholder {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 24px 10px;
    }

    .preview img,
    .preview iframe {
      width: 100%;
      border: 0;
      min-height: 100%;
      display: block;
    }

    .foot {
      border: 0;
      background: rgba(232, 237, 245, 0.85);
      padding: 6px 8px;
      color: #3a4d67;
      white-space: pre-wrap;
      height: 62px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.4;
    }

    .mask {
      position: fixed;
      inset: 0;
      background: rgba(18, 30, 48, 0.22);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .mask.show { display: flex; }

    .mask-box {
      border: 1px solid var(--border-2);
      background: #f6f9ff;
      padding: 10px 12px;
      font-weight: 700;
      color: #1d3550;
    }

    @media (max-width: 1080px) {
      .preview-grid { grid-template-columns: 1fr; }
      .detail-panel { max-height: none; min-height: 0; }
      .source-recog-item { grid-template-columns: 112px 1fr; }
      .source-form-grid { grid-template-columns: 1fr; }
      .bar-layout { grid-template-columns: 1fr; }
      .toolbar-groups { grid-template-columns: 1fr; }
      .log-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="bar">
      <div class="bar-layout">
        <div class="bar-main">
          <input id="sourceFiles" type="file" hidden multiple />
          <input id="instrumentCatalogFile" type="file" hidden accept=".xlsx,.csv,.txt,.doc,.docx" />
          <div class="toolbar-groups">
            <div class="toolbar-group compact">
              <div class="toolbar-group-title">常规操作</div>
              <div class="toolbar-row">
                <button id="uploadBtn" class="primary" type="button">上传</button>
                <button id="refreshAllRecognitionBtn" class="icon-btn" type="button" title="刷新全部识别">↻</button>
                <button id="clearQueueBtn" class="icon-btn" type="button" title="清空列表">⌫</button>
                <button id="runExcelBatchBtn" type="button" hidden>Excel批量生成</button>
              </div>
            </div>
            <div class="toolbar-group catalog-compact">
              <div class="toolbar-group-title with-status">
                <span>器具目录</span>
                <span class="catalog-ready-hint" id="catalogReadyHint">○ 待装填</span>
              </div>
              <div class="toolbar-row no-wrap">
                <button id="uploadInstrumentCatalogBtn" type="button">装填计量标准器具目录</button>
                <button id="clearInstrumentCatalogBtn" type="button">重置</button>
                <button id="viewInstrumentCatalogDetailBtn" type="button">查看识别明细</button>
              </div>
            </div>
          </div>
          <div id="preprocessProgressRow" class="progress-row">
            <span id="preprocessProgressText">预处理：0/0</span>
            <progress id="preprocessProgressBar" max="100" value="0"></progress>
          </div>
        </div>
        <div class="log-panel" id="logPanel">
          <div class="log-panel-head">
            <span class="log-panel-title">日志操作</span>
            <div class="log-head-meta">
              <span class="tag" id="globalStatus">就绪</span>
              <span>证书模板（来源）：<b id="statTotal">0</b></span>
              <span>records：<b id="statRecords">0</b></span>
              <span>已预处理：<b id="statScanned">0</b></span>
            </div>
          </div>
          <div class="foot" id="batchLog">日志：等待操作。</div>
        </div>
      </div>
    </section>

    <div class="main">
      <section class="panel list-panel">
        <div class="head">
          <span>批量列表</span>
          <span id="activeFileText" class="tag">当前：未选择文件</span>
        </div>
        <div class="list-tools">
          <button id="runGenerateAllBtn" type="button" class="small-btn">批量生成选中</button>
          <button id="runBatchBtn" type="button" class="small-btn">批量导出选中</button>
          <input id="filterKeyword" type="text" placeholder="筛选关键词（名称/型号/编号/厂商）" />
          <select id="filterStatus" hidden>
            <option value="">状态：全部</option>
            <option value="pending">待处理</option>
            <option value="processing">处理中</option>
            <option value="ready">可生成</option>
            <option value="incomplete">待补全</option>
            <option value="generated">已生成</option>
            <option value="error">失败</option>
          </select>
          <select id="sortKey" hidden>
            <option value="">排序：默认</option>
            <option value="device_name">器具名称</option>
            <option value="model_code">型号规格</option>
            <option value="device_code">器具编号</option>
            <option value="manufacturer">生产厂商</option>
            <option value="status">状态</option>
            <option value="templateName">模板</option>
          </select>
          <select id="sortDir" hidden>
            <option value="asc">升序</option>
            <option value="desc">降序</option>
          </select>
          <button id="selectVisibleBtn" type="button" class="small-btn">全选当前筛选</button>
          <button id="clearSelectedBtn" type="button" class="small-btn">清空勾选</button>
          <button id="removeSelectedBtn" type="button" class="small-btn">移除选中</button>
          <span id="selectedCountText" class="hint">已选：0</span>
        </div>
        <div class="body" id="queueList"></div>
      </section>
      <div class="panel-splitter hidden" id="listDetailSplitter" title="拖动调整上方批量列表高度">
        <div class="panel-splitter-handle">↕</div>
      </div>
    </div>

    <section class="panel detail-panel" id="detailPanel">
      <div class="head" id="detailPanelHead" title="双击切换预览全屏（Esc退出）">
        <span class="detail-panel-head-main">单条检查<span class="detail-panel-head-hint">（双击预览全屏，Esc退出）</span></span>
      </div>
      <div class="detail">
        <div class="preview-grid">
          <div class="preview-pane source-pane">
            <div class="pane-head">
              <span>证书模板（来源）</span>
              <span class="source-tab-switch">
                <button id="sourceViewPreviewBtn" type="button" class="source-tab-btn is-active">证书模板预览</button>
                <button id="sourceViewFormBtn" type="button" class="source-tab-btn">字段识别</button>
              </span>
            </div>
            <div id="sourcePreviewPanel" class="source-tab-panel is-active">
              <div class="preview" id="sourcePreview"><div class="placeholder">证书模板预览未加载</div></div>
            </div>
            <div id="sourceFieldsPanel" class="source-tab-panel">
              <div class="source-recog-panel">
                <div class="source-recog-head">识别字段清单（只读）</div>
                <div id="sourceFieldList" class="source-recog-list"><div class="placeholder">识别字段未加载</div></div>
              </div>
            </div>
          </div>
          <div class="preview-pane target-pane">
            <div class="target-actions">
              <span class="right-tab-switch">
                <button id="rightTabFieldBtn" type="button" class="right-tab-btn">字段配对</button>
                <button id="rightTabPreviewBtn" type="button" class="right-tab-btn is-active">原始记录预览</button>
              </span>
              <span class="target-generate-group">
                <span class="target-actions-label">生成类型</span>
                <select id="generateModeSelect">
                  <option value="certificate_template">原始记录</option>
                  <option value="source_file">修改证书</option>
                </select>
                <button id="generatePreviewBtn" class="primary" type="button">生成当前</button>
                <button id="downloadCurrentBtn" type="button">导出当前</button>
                <button id="togglePreviewFullscreenBtn" type="button">预览全屏</button>
              </span>
            </div>
            <div id="rightFieldPanel" class="right-tab-panel">
              <div class="target-field-panel">
                <div class="target-field-head">字段配对（可编辑，以此为生成值）</div>
                <div id="targetFieldForm" class="target-field-form"><div class="placeholder">字段表单未加载</div></div>
              </div>
            </div>
            <div id="rightPreviewPanel" class="right-tab-panel is-active">
              <div class="pane-head">
                <span>原始记录模板</span>
                <input id="templateSearch" type="text" list="templateOptions" placeholder="搜索并选择模板" />
                <button id="useBlankTemplateBtn" type="button" class="pane-hint-btn">未命中？用空白模板</button>
                <datalist id="templateOptions"></datalist>
                <datalist id="measurementCatalogNameOptions"></datalist>
                <select id="templateName" hidden></select>
              </div>
              <div class="preview" id="targetPreview"><div class="placeholder">原始记录预览未加载</div></div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <div id="loadingMask" class="mask"><div id="loadingText" class="mask-box">处理中...</div></div>
  <div id="catalogDetailMask" class="catalog-detail-mask" role="dialog" aria-modal="true">
    <div class="catalog-detail-box">
      <div class="catalog-detail-head">
        <span id="catalogDetailTitle">计量标准器具目录识别明细</span>
        <button id="closeCatalogDetailBtn" type="button">关闭</button>
      </div>
      <div class="catalog-detail-table-wrap">
        <div id="catalogDetailContent"><div class="placeholder">暂无识别数据</div></div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      templates: [],
      queue: [],
      activeId: "",
      selectedIds: new Set(),
      listFilter: { keyword: "", status: "", sortKey: "", sortDir: "asc", columnFilters: {}, activeFilterKey: "" },
      busy: false,
      runtime: { offlineMode: false },
      docxReady: false,
      docxLoadingPromise: null,
      blobUrls: { source: "", target: "" },
      instrumentCatalogNames: [],
      instrumentCatalogRows: [],
      instrumentCatalogRowByToken: new Map(),
      instrumentCatalogTokenSet: new Set(),
      instrumentCatalogFileName: "",
      previewFullscreen: false,
      sourceViewMode: "preview",
      rightViewMode: "preview",
      sourceFieldGroupCollapsed: {},
      excelPreviewSheetByFileId: {},
      editorSchemaByTemplate: {},
    };

    const LOCAL_JSZIP_URLS = ["/static/vendor/jszip.min.js"];
    const EXTERNAL_JSZIP_URLS = [
      "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js",
      "https://unpkg.com/jszip@3.10.1/dist/jszip.min.js",
    ];
    const LOCAL_DOCX_PREVIEW_URLS = ["/static/vendor/docx-preview.min.js"];
    const EXTERNAL_DOCX_PREVIEW_URLS = [
      "https://cdn.jsdelivr.net/npm/docx-preview@0.3.6/dist/docx-preview.min.js",
      "https://unpkg.com/docx-preview@0.3.6/dist/docx-preview.min.js",
    ];
    const LOCAL_DOCX_PREVIEW_CSS_URLS = ["/static/vendor/docx-preview.css"];
    const EXTERNAL_DOCX_PREVIEW_CSS_URLS = [
      "https://cdn.jsdelivr.net/npm/docx-preview@0.3.6/dist/docx-preview.css",
      "https://unpkg.com/docx-preview@0.3.6/dist/docx-preview.css",
    ];

    const $ = (id) => document.getElementById(id);
    const SUPPORTED_EXTS = new Set([".docx", ".pdf", ".png", ".jpg", ".jpeg", ".bmp", ".webp", ".tiff", ".tif", ".heic", ".heif", ".pic", ".xlsx"]);
    const FILTER_BLANK_TOKEN = "__BLANK__";

    function createEmptyFields() {
      return {
        device_name: "",
        device_model: "",
        device_code: "",
        manufacturer: "",
        basis_standard: "",
        basis_standard_items: [],
        use_department: "",
        unit_name: "",
        address: "",
        power_rating: "",

      const safeTotal = total > 0 ? total : 1;
      const percent = Math.max(0, Math.min(100, Math.round((current / safeTotal) * 100)));
      row.classList.add("show");
      bar.value = percent;
      text.textContent = `${label}：${current}/${total}${fileName ? `（${fileName}）` : ""}`;

    function escapeAttr(text) {
      return String(text || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function toDateOnlyDisplay(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const normalized = text.replace(/\//g, "-");
      const match = normalized.match(/^(\d{4}-\d{1,2}-\d{1,2})(?:[ T]\d{1,2}:\d{2}(?::\d{1,2})?(?:\.\d+)?(?:Z|[+-]\d{2}:\d{2})?)$/i);
      return match && match[1] ? match[1] : text;
    }

    function statusLabel(s) {
      return {
        pending: "待处理",
        processing: "处理中",
        ready: "可生成",
        incomplete: "待补全",
        generated: "已生成",
        confirmed: "已确认",
        error: "失败",
      }[s] || s;
    }

    function statusClass(s) {
      if (s === "generated" || s === "confirmed" || s === "ready") return "ok";
      if (s === "error") return "err";
      if (s === "processing" || s === "incomplete") return "warn";
      return "";
    }

    function normalizeForCodeMatch(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function extractTemplateCode(value) {
      const normalized = normalizeForCodeMatch(value);
      const match = normalized.match(/(?:r[-_ ]?)?(\d{3}[a-z])/i);
      return match && match[1] ? `r-${String(match[1]).toLowerCase()}` : "";
    }

    function resolveSourceCode(item) {
      if (!item) return "";
      return extractTemplateCode(`${item.fileName || ""}\n${item.rawText || ""}`);
    }

    function resolveTemplateCode(templateName) {
      return extractTemplateCode(templateName || "");
    }

    function isExcelExt(ext) { return ext === ".xlsx"; }
    function extFromName(name) {
      const idx = (name || "").lastIndexOf(".");
      return idx < 0 ? "" : name.slice(idx).toLowerCase();
    }
    function isExcelItem(item) { return !!(item && !item.isRecordRow && isExcelExt(extFromName(item.fileName))); }
    function isSupportedFile(file) { return !!(file && SUPPORTED_EXTS.has(extFromName(file.name || ""))); }

    function shouldUseBlankFallback() { return true; }

    function resolveBlankTemplateName() {

    function readListColumnValue(item, key) {
      const f = item.fields || {};
      if (key === "recordName") return String(item.recordName || "");
      if (key === "device_name") return String(f.device_name || "");
      if (key === "model_code") return String(getModelCodeDisplay(item) || "");

      if (key === "power_rating") return String(f.power_rating || "");
      if (key === "manufacture_date") return String(toDateOnlyDisplay(f.manufacture_date || ""));
      if (key === "contact_info") return String(f.contact_info || "");
      if (key === "measurement_item_count") return String(f.measurement_item_count || "");
      if (key === "manufacturer") return String(f.manufacturer || "");
      if (key === "use_department") return String(f.use_department || "");
      if (key === "unit_name") return String(f.unit_name || "");
      if (key === "address") return String(f.address || "");
      if (key === "status") return String(item.status || "");
      if (key === "templateName") return String(item.templateName || "");
      return "";
    }

    function isListBlankField(value) {
      const text = String(value || "").trim();
      if (!text) return true;
      return /^[\s\/-]+$/.test(text);
    }

    function normalizeListFilterToken(value) {
      const text = String(value || "").trim();
      if (isListBlankField(text)) return FILTER_BLANK_TOKEN;
      return text;
    }

    function formatListFilterLabel(token) {
      return token === FILTER_BLANK_TOKEN ? "(空)" : token;
    }

    function getKeywordStatusFilteredQueue() {
      const keyword = String(state.listFilter.keyword || "").trim().toLowerCase();
      const status = String(state.listFilter.status || "").trim();
      return state.queue.filter((item) => {
        if (status && item.status !== status) return false;
        if (!keyword) return true;
        const f = item.fields || {};
        const text = [
          item.recordName || "",
          f.device_name || "",
          f.device_model || "",
          f.device_code || "",
          f.manufacturer || "",
          f.use_department || "",
          f.unit_name || "",
          f.address || "",
          item.templateName || "",
          item.category || "",
          item.message || "",
        ].join(" ").toLowerCase();
        return text.includes(keyword);
      });
    }

    function getColumnFilterOptionEntries(key, sourceItems = null) {
      const counts = new Map();
      const baseItems = Array.isArray(sourceItems) ? sourceItems : getKeywordStatusFilteredQueue();
      baseItems.forEach((item) => {
        const token = normalizeListFilterToken(readListColumnValue(item, key));
        counts.set(token, (counts.get(token) || 0) + 1);
      });
      const sortedTokens = Array.from(counts.keys()).sort((a, b) => {
        if (a === FILTER_BLANK_TOKEN) return -1;
        if (b === FILTER_BLANK_TOKEN) return 1;
        return String(a).localeCompare(String(b), "zh-CN");
      });
      return sortedTokens.map((token) => ({
        token,
        label: formatListFilterLabel(token),
        count: counts.get(token) || 0,
      }));
    }

    function getFilteredSortedQueue() {
      const sortKey = String(state.listFilter.sortKey || "").trim();
      const sortDir = state.listFilter.sortDir === "desc" ? -1 : 1;
      const columnFilters = state.listFilter.columnFilters && typeof state.listFilter.columnFilters === "object"
        ? state.listFilter.columnFilters
        : {};
      const activeFilters = Object.entries(columnFilters)
        .map(([key, values]) => [String(key || "").trim(), Array.isArray(values) ? values.map((x) => String(x || "")).filter(Boolean) : []])
        .filter(([key, values]) => !!key && values.length > 0);

      let items = getKeywordStatusFilteredQueue().map((item, idx) => ({ item, idx }));

      if (activeFilters.length) {
        items = items.filter(({ item }) => activeFilters.every(([key, values]) => {
          const token = normalizeListFilterToken(readListColumnValue(item, key));
          return values.includes(token);
        }));
      }

      if (sortKey) {
        items.sort((a, b) => {
          const av = readListColumnValue(a.item, sortKey).toLowerCase();
          const bv = readListColumnValue(b.item, sortKey).toLowerCase();
          if (av === bv) return a.idx - b.idx;
          return av > bv ? sortDir : -sortDir;
        });
      }
      return items.map((x) => x.item);
    }

    function renderQueue() {
      renderStats();
      const wrap = $("queueList");
      state.selectedIds = new Set(state.queue.filter((x) => state.selectedIds.has(x.id)).map((x) => x.id));
      if (!state.queue.length) {
        wrap.innerHTML = '<div style="padding:16px;color:#5c6f89;">暂无文件（上传可选文件；也可拖拽文件/文件夹到此处）</div>';
        $("activeFileText").textContent = "当前：未选择文件";
        updateSelectedCountText([]);
        updateDetailPanelVisibility();
        refreshActionButtons();
        return;
      }
      const visibleItems = getFilteredSortedQueue();
      if (!visibleItems.length) {
        wrap.innerHTML = '<div style="padding:16px;color:#5c6f89;">当前筛选条件下无记录</div>';
        updateSelectedCountText([]);
        refreshActionButtons();
        return;
      }
      const allVisibleChecked = visibleItems.length > 0 && visibleItems.every((x) => state.selectedIds.has(x.id));
      const filterOptionItems = getKeywordStatusFilteredQueue();
      const columnFilters = state.listFilter.columnFilters && typeof state.listFilter.columnFilters === "object"
        ? state.listFilter.columnFilters
        : {};
      const activeFilterKey = String(state.listFilter.activeFilterKey || "").trim();
      const buildHeadCell = (label, key) => {
        if (!key) return `<th>${escapeHtml(label)}</th>`;
        const isSortActive = state.listFilter.sortKey === key;
        const isAsc = state.listFilter.sortDir !== "desc";
        const sortIcon = isSortActive ? (isAsc ? "↑" : "↓") : "↕";
        const selectedTokens = Array.isArray(columnFilters[key]) ? columnFilters[key] : [];
        const isFilterActive = selectedTokens.length > 0;
        const triggerText = isFilterActive ? `筛(${selectedTokens.length})` : "筛";
        const options = getColumnFilterOptionEntries(key, filterOptionItems);
        const optionsHtml = options.length
          ? options.map((opt) => {
            const checked = selectedTokens.includes(opt.token);
            return `<label class="th-filter-opt"><input type="checkbox" class="th-filter-option" data-filter-key="${escapeAttr(key)}" data-filter-token="${escapeAttr(opt.token)}" ${checked ? "checked" : ""} /><span class="th-filter-label" title="${escapeAttr(opt.label)}">${escapeHtml(opt.label)}</span><span class="th-filter-count">${opt.count}</span></label>`;
          }).join("")
          : '<div class="th-filter-count">无可筛选值</div>';
        const menuHtml = activeFilterKey === key
          ? `<div class="th-filter-menu"><div class="th-filter-actions"><button type="button" class="th-filter-act" data-filter-act="all" data-filter-key="${escapeAttr(key)}">全选</button><button type="button" class="th-filter-act" data-filter-act="clear" data-filter-key="${escapeAttr(key)}">清空</button><button type="button" class="th-filter-act" data-filter-act="only_blank" data-filter-key="${escapeAttr(key)}">仅空</button><button type="button" class="th-filter-act" data-filter-act="only_non_blank" data-filter-key="${escapeAttr(key)}">仅非空</button></div><div class="th-filter-options">${optionsHtml}</div></div>`
          : "";
        return `<th><span class="th-cell"><button type="button" class="th-sort-btn ${isSortActive ? "is-active" : ""}" data-sort-key="${escapeAttr(key)}"><span>${escapeHtml(label)}</span><span class="th-sort-icon">${sortIcon}</span></button><button type="button" class="th-filter-trigger ${isFilterActive ? "is-active" : ""}" data-filter-key="${escapeAttr(key)}">${escapeHtml(triggerText)}</button>${menuHtml}</span></th>`;
      };
      const rows = visibleItems.map((item, i) => `
        <tr data-id="${escapeAttr(item.id)}" class="${item.id === state.activeId ? "active" : ""}">

    function setInstrumentCatalog(names, fileName = "", rows = []) {
      const normalizedRows = Array.isArray(rows)
        ? rows.map((row) => ({
            name: String((row && row.name) || "").trim(),
            model: String((row && row.model) || "").trim(),
            code: String((row && row.code) || "").trim(),
            measurement_range: String((row && row.measurement_range) || "").trim(),
            uncertainty: String((row && row.uncertainty) || "").trim(),
            certificate_no: String((row && row.certificate_no) || "").trim(),
            valid_date: String((row && row.valid_date) || "").trim(),
            traceability_institution: String((row && row.traceability_institution) || "").trim(),
          }))
        : [];
      const normalizedNames = Array.isArray(names)
        ? names.map((x) => String(x || "").trim()).filter((x) => !!x && !isPlaceholderValue(x))
        : [];
      const deduped = [];
      const dedupedRows = [];
      const tokenSet = new Set();
      const rowByToken = new Map();
      normalizedRows.forEach((row) => {
        const token = normalizeCatalogToken(row.name);
        if (!token || tokenSet.has(token)) return;
        tokenSet.add(token);
        deduped.push(row.name);
        dedupedRows.push(row);
        rowByToken.set(token, row);
      });
      normalizedNames.forEach((name) => {
        const token = normalizeCatalogToken(name);
        if (!token || tokenSet.has(token)) return;
        tokenSet.add(token);
        deduped.push(name);
        const row = {
          name,
          model: "",
          code: "",
          measurement_range: "",
          uncertainty: "",
          certificate_no: "",
          valid_date: "",
          traceability_institution: "",
        };
        dedupedRows.push(row);
        rowByToken.set(token, row);
      });
      state.instrumentCatalogNames = deduped;
      state.instrumentCatalogRows = dedupedRows;
      state.instrumentCatalogRowByToken = rowByToken;
      state.instrumentCatalogTokenSet = tokenSet;
      state.instrumentCatalogFileName = String(fileName || "").trim();
      const uploadBtn = $("uploadInstrumentCatalogBtn");
      if (uploadBtn) uploadBtn.textContent = deduped.length ? "重装计量标准器具目录" : "装填计量标准器具目录";
      renderCatalogReadyHint();
      renderMeasurementCatalogNameOptions();

      renderQueue();
