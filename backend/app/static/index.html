<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>证书模板与原始记录批量工具</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/app.css?v=20260331-1630" />
</head>
<body>
  <div class="shell">
    <section class="bar">
      <div class="bar-layout">
        <div class="bar-main">
          <input id="sourceFiles" type="file" hidden multiple />
          <input id="instrumentCatalogFile" type="file" hidden accept=".xlsx,.csv,.txt,.doc,.docx" />
          <div class="toolbar-groups">
            <div class="toolbar-group compact">
              <div class="toolbar-group-title">常规操作</div>
              <div class="toolbar-row">
                <button id="uploadBtn" class="primary" type="button"><i class="fa-solid fa-upload btn-icon" aria-hidden="true"></i><span class="btn-text">上传</span></button>
                <button id="refreshAllRecognitionBtn" class="icon-btn" type="button" title="刷新全部识别"><i class="fa-solid fa-rotate-right" aria-hidden="true"></i></button>
                <button id="clearQueueBtn" class="icon-btn" type="button" title="清空列表"><i class="fa-solid fa-trash-can" aria-hidden="true"></i></button>
              </div>
            </div>
            <div class="toolbar-group catalog-compact">
              <div class="toolbar-group-title with-status">
                <span>器具目录</span>
                <span class="catalog-ready-hint" id="catalogReadyHint">○ 待装填</span>
              </div>
              <div class="toolbar-row no-wrap">
                <button id="uploadInstrumentCatalogBtn" type="button"><i class="fa-solid fa-book btn-icon" aria-hidden="true"></i><span class="btn-text">装填计量标准器具目录</span></button>
                <button id="clearInstrumentCatalogBtn" type="button"><i class="fa-solid fa-rotate-left btn-icon" aria-hidden="true"></i><span class="btn-text">重置</span></button>
                <button id="viewInstrumentCatalogDetailBtn" type="button"><i class="fa-solid fa-list-check btn-icon" aria-hidden="true"></i><span class="btn-text">查看识别明细</span></button>
              </div>
            </div>
          </div>
          <div id="preprocessProgressRow" class="progress-row">
            <span id="preprocessProgressText">预处理：0/0</span>
            <progress id="preprocessProgressBar" max="100" value="0"></progress>
          </div>
        </div>
        <div class="log-panel" id="logPanel">
          <div class="log-panel-head">
            <span class="log-panel-title">日志操作</span>
            <div class="log-head-meta">
              <span class="tag" id="globalStatus">就绪</span>
              <span>证书模板（来源）：<b id="statTotal">0</b></span>
              <span>records：<b id="statRecords">0</b></span>
              <span>已预处理：<b id="statScanned">0</b></span>
            </div>
          </div>
          <div class="foot" id="batchLog">日志：等待操作。</div>
        </div>
      </div>
    </section>

    <div class="main">
      <section class="panel list-panel">
        <div class="head">
          <span>任务列表</span>
          <span id="activeFileText" class="tag">当前：未选择文件</span>
        </div>
        <div class="list-tools">
          <button id="toggleSelectModeBtn" type="button" class="small-btn" title="当前：单选模式（点击切换复选）" aria-label="当前：单选模式（点击切换复选）"><i class="fa-solid fa-list-check btn-icon" aria-hidden="true"></i></button>
          <button id="runGenerateAllBtn" type="button" class="small-btn"><i class="fa-solid fa-gears btn-icon" aria-hidden="true"></i><span class="btn-text">批量生成选中</span></button>
          <button id="runBatchBtn" type="button" class="small-btn"><i class="fa-solid fa-file-export btn-icon" aria-hidden="true"></i><span class="btn-text">批量导出选中</span></button>
          <select id="filterStatus" hidden>
            <option value="">状态：全部</option>
            <option value="pending">待处理</option>
            <option value="processing">处理中</option>
            <option value="ready">可生成</option>
            <option value="incomplete">待补全</option>
            <option value="generated">已生成</option>
            <option value="error">失败</option>
          </select>
          <select id="sortKey" hidden>
            <option value="">排序：默认</option>
            <option value="device_name">器具名称</option>
            <option value="model_code">型号规格</option>
            <option value="device_code">器具编号</option>
            <option value="manufacturer">生产厂商</option>
            <option value="status">状态</option>
            <option value="templateName">模板</option>
          </select>
          <select id="sortDir" hidden>
            <option value="asc">升序</option>
            <option value="desc">降序</option>
          </select>
          <button id="removeSelectedBtn" type="button" class="small-btn"><i class="fa-solid fa-trash btn-icon" aria-hidden="true"></i><span class="btn-text">移除选中</span></button>
          <input id="filterKeyword" type="text" placeholder="筛选关键词（名称/型号/编号/厂商）" />
          <span id="selectedCountText" class="hint">已选：0</span>
        </div>
        <div class="body" id="queueList"></div>
      </section>
      <div class="panel-splitter hidden" id="listDetailSplitter" title="拖动调整上方任务列表高度">
        <div class="panel-splitter-handle">↕</div>
      </div>
    </div>

    <section class="panel detail-panel" id="detailPanel">
      <div class="head" id="detailPanelHead" title="双击切换预览全屏（Esc退出）">
        <span class="detail-panel-head-main">
          单条检查
          <span class="detail-panel-head-hint">（双击预览全屏，Esc退出）</span>
          <span class="detail-nav">
            <button id="prevItemBtn" type="button" class="small-btn" title="上一条"><i class="fa-solid fa-chevron-left btn-icon" aria-hidden="true"></i><span class="btn-text">上一个</span></button>
            <button id="nextItemBtn" type="button" class="small-btn" title="下一条"><i class="fa-solid fa-chevron-right btn-icon" aria-hidden="true"></i><span class="btn-text">下一个</span></button>
          </span>
        </span>
      </div>
      <div class="detail">
        <div class="preview-grid">
          <div class="preview-pane source-pane">
            <div class="pane-head">
              <span>证书模板（来源）</span>
              <span id="sourceDeviceNameText" class="pane-head-device">器具名称：-</span>
              <span class="source-tab-switch">
                <button id="sourceViewPreviewBtn" type="button" class="source-tab-btn is-active"><i class="fa-solid fa-file-lines btn-icon" aria-hidden="true"></i><span class="btn-text">证书模板预览</span></button>
                <button id="sourceViewFormBtn" type="button" class="source-tab-btn"><i class="fa-solid fa-list-ul btn-icon" aria-hidden="true"></i><span class="btn-text">字段识别</span></button>
              </span>
            </div>
            <div id="sourcePreviewPanel" class="source-tab-panel is-active">
              <div class="preview" id="sourcePreview"><div class="placeholder">证书模板预览未加载</div></div>
            </div>
            <div id="sourceFieldsPanel" class="source-tab-panel">
              <div class="source-recog-panel">
                <div class="source-recog-head">识别字段清单（只读）</div>
                <div id="sourceFieldList" class="source-recog-list"><div class="placeholder">识别字段未加载</div></div>
              </div>
            </div>
          </div>
          <div class="preview-pane target-pane">
            <div class="target-actions">
              <span class="right-tab-switch">
                <button id="rightTabPreviewBtn" type="button" class="right-tab-btn is-active"><i class="fa-solid fa-eye btn-icon" aria-hidden="true"></i><span class="btn-text">原始记录预览</span></button>
                <button id="rightTabFieldBtn" type="button" class="right-tab-btn"><i class="fa-solid fa-pen-to-square btn-icon" aria-hidden="true"></i><span class="btn-text">字段编辑</span></button>
              </span>
              <span class="target-generate-group">
                <span class="target-actions-label">生成类型</span>
                <select id="generateModeSelect">
                  <option value="source_file" selected>修改证书</option>
                  <option value="certificate_template">原始记录</option>
                </select>
                <button id="generatePreviewBtn" class="primary" type="button"><i class="fa-solid fa-play btn-icon" aria-hidden="true"></i><span class="btn-text">生成当前</span></button>
                <button id="downloadCurrentBtn" type="button"><i class="fa-solid fa-download btn-icon" aria-hidden="true"></i><span class="btn-text">导出当前</span></button>
                <button id="togglePreviewFullscreenBtn" type="button"><i class="fa-solid fa-expand btn-icon" aria-hidden="true"></i><span class="btn-text">预览全屏</span></button>
              </span>
            </div>
            <div id="rightFieldPanel" class="right-tab-panel">
              <div class="target-field-panel">
                <div class="target-field-head">字段编辑（所见即所得，可编辑，以此为生成值）</div>
                <div id="targetFieldForm" class="target-field-form"><div class="placeholder">字段表单未加载</div></div>
              </div>
            </div>
            <div id="rightPreviewPanel" class="right-tab-panel is-active">
              <div class="pane-head">
                <span id="targetPaneTitle">原始记录模板</span>
                <input id="templateSearch" type="text" list="templateOptions" placeholder="搜索并选择模板" />
                <button id="useBlankTemplateBtn" type="button" class="pane-hint-btn"><i class="fa-solid fa-file-circle-plus btn-icon" aria-hidden="true"></i><span class="btn-text">未命中？用空白模板</span></button>
                <button id="templateFeedbackBtn" type="button" class="pane-hint-btn"><i class="fa-solid fa-wrench btn-icon" aria-hidden="true"></i><span class="btn-text">纠错入库</span></button>
                <datalist id="templateOptions"></datalist>
                <datalist id="measurementCatalogNameOptions"></datalist>
                <select id="templateName" hidden></select>
              </div>
              <div class="preview" id="targetPreview"><div class="placeholder">原始记录预览未加载</div></div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <div id="loadingMask" class="mask"><div id="loadingText" class="mask-box">处理中...</div></div>
  <div id="catalogDetailMask" class="catalog-detail-mask" role="dialog" aria-modal="true">
    <div class="catalog-detail-box">
      <div class="catalog-detail-head">
        <span id="catalogDetailTitle">计量标准器具目录识别明细</span>
        <button id="closeCatalogDetailBtn" type="button"><i class="fa-solid fa-xmark btn-icon" aria-hidden="true"></i><span class="btn-text">关闭</span></button>
      </div>
      <div class="catalog-detail-table-wrap">
        <div id="catalogDetailContent"><div class="placeholder">暂无识别数据</div></div>
      </div>
    </div>
  </div>
  <script type="module" src="/static/js/app/main.js?v=20260331-1650"></script>
</body>
</html>
