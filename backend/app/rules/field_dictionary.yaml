aliases:
  device_name:
    - deviceName
    - 气瓶名称
    - 设备名称
    - 仪器名称
    - name
  device_model:
    - deviceModel
    - 型号
    - 型号规格
    - 型号/规格
    - 规格型号
    - model
  device_code:
    - deviceCode
    - 气瓶编号
    - 设备编号
    - 仪器编号
    - 资产编号
    - 编号
    - serial
    - code
  manufacturer:
    - manufacturerName
    - 生产厂商
    - 制造厂商
    - 制造厂/商
    - 制造商
    - 厂家
    - 厂商
  basis_standard:
    - calibration_basis
    - basis
    - 检测依据
    - 校准依据
    - 检测/校准依据
    - 技术规范代号
  location:
    - 校准地点
    - 检测地点
    - 地点
  temperature:
    - 温度
  humidity:
    - 湿度
  certificate_no:
    - 证书编号
    - 证书号
    - 缆专检号
  client_name:
    - 委托单位
    - 客户名称
    - 客户
  receive_date:
    - 收样日期
    - 收样时间
  calibration_date:
    - 校准日期
    - 检定日期
    - 检测日期

formulas:
  - type: unify_dates
    receive_key: receive_date
    calibration_key: calibration_date
  - type: date_offset
    source_key: calibration_date
    fallback_key: receive_date
    target_key: publish_date
    days: 1
  - type: linearity_metrics
    ux_key: linearity_ux_values
    u2_key: linearity_u2_values
    fi_key: linearity_fi_values
    f_avg_key: linearity_f_avg
    delta_key: linearity_fi_delta_percent
    precision: 6
    delta_precision: 4

formula_profiles:
  - template_pattern: "r[-_ ]?859b|工频高电压测量系统|040\\s*工频高电压测量系统"
    formulas:
      - type: linearity_metrics
        ux_key: linearity_ux_values
        u2_key: linearity_u2_values
        fi_key: linearity_fi_values
        f_avg_key: linearity_f_avg
        delta_key: linearity_fi_delta_percent
        precision: 6
        delta_precision: 4
  - template_pattern: "r[-_ ]?860b|直流高电压测量系统"
    formulas:
      - type: linearity_metrics
        ux_key: linearity_ux_values
        u2_key: linearity_u2_values
        fi_key: linearity_fi_values
        f_avg_key: linearity_f_avg
        delta_key: linearity_fi_delta_percent
        precision: 6
        delta_precision: 4
  - template_pattern: "r[-_ ]?875b|交流通用分压器测量系统"
    formulas:
      - type: linearity_metrics
        ux_key: linearity_ux_values
        u2_key: linearity_u2_values
        fi_key: linearity_fi_values
        f_avg_key: linearity_f_avg
        delta_key: linearity_fi_delta_percent
        precision: 6
        delta_precision: 4
  - template_pattern: "r[-_ ]?876b|直流通用分压器测量系统"
    formulas:
      - type: linearity_metrics
        ux_key: linearity_ux_values
        u2_key: linearity_u2_values
        fi_key: linearity_fi_values
        f_avg_key: linearity_f_avg
        delta_key: linearity_fi_delta_percent
        precision: 6
        delta_precision: 4
  - template_pattern: "r[-_ ]?877b|冲击电压通用分压器测量系统"
    formulas:
      - type: linearity_metrics
        ux_key: linearity_ux_values
        u2_key: linearity_u2_values
        fi_key: linearity_fi_values
        f_avg_key: linearity_f_avg
        delta_key: linearity_fi_delta_percent
        precision: 6
        delta_precision: 4
  - template_pattern: "036\\s*局放|037\\s*局放|局部放电|PDIV|PDEV"
    formulas:
      - type: list_mean
        source_key: pd_charge_values_pc
        target_key: pd_charge_avg_pc
        precision: 4
      - type: list_mean
        source_key: pd_rise_time_values_ns
        target_key: pd_rise_time_avg_ns
        precision: 4
      - type: list_mean
        source_key: pd_pulse_amplitude_values_v
        target_key: pd_pulse_amplitude_avg_v
        precision: 4
  - template_pattern: "882b|屏蔽室"
    formulas:
      - type: list_subtract
        left_key: shield_p1_dbm_values
        right_key: shield_p2_dbm_values
        target_key: shield_se_db_values
        precision: 3
      - type: list_mean
        source_key: shield_se_db_values
        target_key: shield_se_avg_db
        precision: 3
  - template_pattern: "56\\s*20kv击穿电压试验仪|58\\s*15kv击穿电压试验仪|击穿电压试验仪"
    formulas:
      - type: list_mean
        source_key: breakdown_voltage_values_kv
        target_key: breakdown_voltage_avg_kv
        precision: 4
      - type: list_stddev
        source_key: breakdown_voltage_values_kv
        target_key: breakdown_voltage_stddev_kv
        precision: 4
