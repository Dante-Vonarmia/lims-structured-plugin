code: r-899b
template_name: "modify-certificate-blueprint.docx"
template_aliases:
  - "modify-certificate-blueprint.docx"
  - "modify-certificate-blueprint"
  - "2026030604-大特.docx"
  - "2026030604-大特"
editor:
  note: "大特气瓶报告模板专属字段（每份报告可单独填写）"
  fields:
    - key: report_owner_name
      label: "报告抬头公司"
      wide: true
    - key: gas_type
      label: "充装介质"
      options:
        - "氧气"
        - "氩气"
        - "二氧化碳"
        - "氮气"
        - "混合气"
    - key: cylinder_total_count
      label: "送检总数（只）"
    - key: qualified_count
      label: "合格数量（只）"
    - key: valve_replaced_count
      label: "换阀数量（只）"
    - key: valve_vendor_name
      label: "阀门生产单位"
      wide: true
    - key: scrap_count
      label: "报废数量（只）"
    - key: report_date
      label: "报告日期"
    - key: inspector_sign_image
      label: "检验员签字图片"
      wide: true
    - key: reviewer_sign_image
      label: "审核签字图片"
      wide: true
    - key: approver_sign_image
      label: "批准签字图片"
      wide: true
    - key: submit_org_name
      label: "送检单位"
      wide: true
    - key: appendix1_rows_text
      label: "附表1明细（每行：气瓶编号\\t制造单位代码\\t下次检验日期）"
      wide: true
fill:
  placeholders:
    - marker: "【记录编号】"
      key: "record_no"
      fallback_keys: ["certificate_no"]
      default: ""
    - marker: "【保存期限】"
      key: "retention_period"
      default: "6年"
    - marker: "【报告抬头公司】"
      key: "report_owner_name"
      fallback_keys: ["submit_org_name", "client_name"]
      default: ""
    - marker: "【充装介质】"
      key: "gas_type"
      default: ""
    - marker: "【送检总数】"
      key: "cylinder_total_count"
      default: ""
    - marker: "【合格数量】"
      key: "qualified_count"
      default: ""
    - marker: "【换阀数量】"
      key: "valve_replaced_count"
      default: ""
    - marker: "【阀门生产单位】"
      key: "valve_vendor_name"
      default: ""
    - marker: "【报废数量】"
      key: "scrap_count"
      default: ""
    - marker: "【报告日期】"
      key: "report_date"
      fallback_keys: ["release_date", "publish_date", "calibration_date", "receive_date"]
      default: ""
    - marker: "【送检单位】"
      key: "submit_org_name"
      fallback_keys: ["client_name"]
      default: ""
