generic_record_table:
  threshold: 4
  score_groups:
    - weight: 2
      markers: ["气瓶名称", "设备名称", "仪器名称"]
    - weight: 2
      markers: ["型号/规格", "型号规格", "规格型号"]
    - weight: 2
      markers: ["气瓶编号", "设备编号", "仪器编号"]
    - weight: 1
      markers: ["制造厂/商", "制造厂", "制造商", "生产厂商", "厂商", "厂家"]
    - weight: 1
      markers: ["校准依据", "检测依据", "依据"]
    - weight: 1
      markers: ["校准地点", "检测地点", "地点"]
    - weight: 1
      markers: ["原始记录"]

base_fields:
  - key: certificate_no
    markers: ["缆专检号", "Certificate series number"]
    format: "缆专检号：{value}"
  - key: client_name
    markers: ["委托单位", "Client"]
    format: "委托单位：{value}"
  - key: address
    markers: ["地址", "Address"]
    format: "地址：{value}"
  - key: basis_standard
    markers: ["校准依据", "检测依据", "检测/校准依据", "依据"]
    format: "{mode_prefix}依据：{value}"
    mode_aware: true
  - key: device_name
    markers: ["气瓶名称", "设备名称", "仪器名称"]
    format: "气瓶名称：{value}"
  - key: manufacturer
    markers: ["制造厂/商", "制造厂", "制造商", "生产厂商", "厂商", "厂家"]
    format: "制造厂/商：{value}"
  - key: device_model
    markers: ["型号/规格", "型号规格", "规格型号", "型号"]
    format: "型号/规格：{value}"
  - key: device_code
    markers: ["气瓶编号", "设备编号", "仪器编号", "编号"]
    format: "气瓶编号：{value}"
  - key: location
    markers: ["校准地点", "检测地点", "地点"]
    format: "{mode_prefix}地点：{value}"
    mode_aware: true
