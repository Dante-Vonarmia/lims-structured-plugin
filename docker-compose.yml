name: lims-device-report

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lims-device-report-backend
    restart: unless-stopped
    environment:
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      TEMPLATE_DIR: /app/templates
      RAW_RECORD_DIR: /app/raw-records
      DEFAULT_TEMPLATE_NAME: report_template.docx
      OFFLINE_MODE: "1"
      OCR_ENGINE_ORDER: rapid,tesseract
    volumes:
      - ./backend:/app
    ports:
      - "18081:8000"
